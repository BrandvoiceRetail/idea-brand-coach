# Brand-Coach MCP gateway — runs on the mango Lightsail box.
#
# Caddy runs in a container (mango-caddy-1) on the external `mango_default` network
# and reverse-proxies https://ideabrandcoach.icodemybusiness.com/mcp -> this service
# by NAME (brand-coach-mcp:8787), so the gateway joins that network. The host publish
# (127.0.0.1:8787) is kept for local health checks only.
#
# Primary path: load the prebuilt image (`docker load`), then `docker compose up -d`.
# Fallback: uncomment `build:` to build on the box from a rsynced repo checkout.
services:
  brand-coach-mcp:
    image: brand-coach-mcp:latest
    # build:
    #   context: ../..              # repo root (needs dist-mcp/server.mjs present)
    #   dockerfile: deploy/mcp/Dockerfile
    container_name: brand-coach-mcp
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8787:8787"
    networks:
      - mango_default

networks:
  # The network Caddy (mango-caddy-1) is on — created by the mango compose project.
  mango_default:
    external: true
