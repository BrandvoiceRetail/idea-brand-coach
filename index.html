    <!-- Inter — the v23 display + body face (Fraunces serif retired; app + site one family) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600;1,700&display=swap" rel="stylesheet" />

    <!-- Apply the persisted theme before paint (default dark) to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('idea-theme');
          if (t !== 'light') document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
