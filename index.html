    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Inter — the v23 display + body face (Fraunces serif retired; app + site one family).
         SELF-HOSTED (GDPR: fonts.googleapis.com leaked visitor IPs to Google pre-consent). -->
    <link rel="stylesheet" href="/fonts/inter.css" />

    <!-- Apply the persisted theme before paint (default dark) to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('idea-theme');
          if (t !== 'light') document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
