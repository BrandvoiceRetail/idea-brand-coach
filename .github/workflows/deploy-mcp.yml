name: Deploy MCP gateway (SUPERSEDED — do not use)

# ⚠️ SUPERSEDED 2026-07-19 by .github/workflows/deploy.yml (self-hosted runner on the box,
# which rebuilds the MCP container in the same run). This GitHub-hosted workflow can NEVER
# deploy: the box firewalls inbound SSH (port 22), so ubuntu-latest runners time out. The
# push trigger is removed so it stops emitting "skipped" runs. Safe to `git rm` this file.

on:
  workflow_dispatch:

concurrency:
  group: deploy-mcp
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Opt-in: stays a no-op until you set repo variable MCP_AUTODEPLOY=true AND add
    # the LIGHTSAIL_SSH_KEY secret. Prevents a red run on merges before setup is done.
    if: ${{ vars.MCP_AUTODEPLOY == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Gate the deploy on a green gateway: typecheck + the MCP test suite.
      - run: npm run typecheck:mcp
      - run: npm test -- src/mcp --pool=threads

      # Bundle (-> dist-mcp/server.mjs) + build the amd64 runtime image (runner is amd64).
      - run: npm run mcp:bundle
      - name: Build image
        run: docker build --platform linux/amd64 -f deploy/mcp/Dockerfile -t brand-coach-mcp:latest .
      - name: Export image
        run: docker save brand-coach-mcp:latest | gzip > brand-coach-mcp.tar.gz

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${MCP_DEPLOY_HOST:-54.243.53.44}" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          MCP_DEPLOY_HOST: ${{ vars.MCP_DEPLOY_HOST }}

      - name: Ship + reload on the box
        env:
          DEPLOY_HOST: ${{ vars.MCP_DEPLOY_HOST || '54.243.53.44' }}
          DEPLOY_USER: ${{ vars.MCP_DEPLOY_USER || 'ubuntu' }}
        run: |
          scp -i ~/.ssh/deploy_key brand-coach-mcp.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:~/brand-coach-mcp/"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            'cd ~/brand-coach-mcp && docker load -i brand-coach-mcp.tar.gz && docker compose up -d --force-recreate && rm -f brand-coach-mcp.tar.gz && sleep 3 && curl -fsS http://127.0.0.1:8787/healthz'

      - name: Verify gateway is live over the public URL
        run: |
          set -e
          out=$(curl -fsS -X POST https://ideabrandcoach.icodemybusiness.com/mcp \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}')
          echo "$out" | grep -q '"name":"health"' || { echo "tools/list missing health"; exit 1; }
          echo "MCP gateway live; tools/list responded."
