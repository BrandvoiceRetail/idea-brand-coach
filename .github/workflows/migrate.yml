name: Apply DB migrations (gated)

# Applies pending Supabase migrations to PROD, behind a manual-approval gate.
#
# WHY A SEPARATE WORKFLOW: a GitHub Environment approval gates a whole JOB, so putting
# migrations inside deploy.yml would force a manual approval on EVERY push (even code-only
# ones). Path-filtering this workflow to supabase/migrations/** means the approval prompt
# only appears when a migration actually changed.
#
# ORDERING CAVEAT: for a coordinated schema+code change (e.g. a table rename), this runs in
# parallel with deploy.yml. Approve THIS run first so the schema lands before the renamed
# code deploys; otherwise there is a brief window where new code hits the old schema. (With
# the manual gate + prompt approval this is a few minutes — the same window as a manual deploy.)
#
# ONE-TIME SETUP:
#   - GitHub → repo Settings → Environments → New environment `production-db`
#       → Required reviewers: add yourself (this is the approval gate).
#   - Secrets (repo or the production-db environment):
#       SUPABASE_ACCESS_TOKEN  — personal access token (management API).
#       SUPABASE_DB_PASSWORD   — the project's database password (for `supabase db push`).
#   - Runner: the self-hosted `lightsail` runner (has the supabase CLI + network to Supabase).

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch: {}

concurrency:
  group: db-migrate
  cancel-in-progress: false          # never interrupt a migration mid-apply

permissions:
  contents: read

env:
  SUPABASE_PROJECT_REF: ecdrxtbclxfpkknasmrw

jobs:
  migrate:
    runs-on: [self-hosted, lightsail]
    environment: production-db        # <- manual-approval gate (required reviewer)
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Preconditions
        run: |
          command -v supabase >/dev/null 2>&1 || { echo "::error::supabase CLI not on runner"; exit 1; }
          [ -n "$SUPABASE_ACCESS_TOKEN" ] || { echo "::error::SUPABASE_ACCESS_TOKEN not set"; exit 1; }
          [ -n "$SUPABASE_DB_PASSWORD" ]  || { echo "::error::SUPABASE_DB_PASSWORD not set"; exit 1; }
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Show pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase migration list --linked --project-ref "$SUPABASE_PROJECT_REF" || true

      - name: Apply pending migrations
        # `db push` compares local supabase/migrations/** against the remote migration
        # history and applies only what's pending. Non-interactive in CI.
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --linked --project-ref "$SUPABASE_PROJECT_REF"

      - name: Confirm applied
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase migration list --linked --project-ref "$SUPABASE_PROJECT_REF"
