<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">When the main image and the bullets sell two different promises, CTR and CVR move in opposite directions — one coordinated statement fixes both.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- Step 1: Main image -->
  <rect x="48" y="130" width="290" height="140" rx="10" fill="#3E8FC4" fill-opacity="0.18" stroke="#3E8FC4" stroke-width="2"/>
  <text x="193" y="188" text-anchor="middle" font-size="24">Main image</text>
  <text x="193" y="220" text-anchor="middle" font-size="20" fill="#3E8FC4">sells "range"</text>

  <!-- Step 2: Bullets -->
  <rect x="48" y="320" width="290" height="140" rx="10" fill="#CC4F42" fill-opacity="0.18" stroke="#CC4F42" stroke-width="2"/>
  <text x="193" y="378" text-anchor="middle" font-size="24">Bullets</text>
  <text x="193" y="410" text-anchor="middle" font-size="20" fill="#CC4F42">still sell "cleanup"</text>

  <text x="193" y="500" text-anchor="middle" font-size="20" class="dim">CTR up, CVR down</text>

  <!-- arrow to tool -->
  <line x1="380" y1="280" x2="470" y2="280" stroke="rgba(245,244,240,.5)" stroke-width="2" stroke-linecap="round" class="anim-flow"/>
  <polygon points="470,280 456,271 456,289" fill="rgba(245,244,240,.5)"/>

  <rect x="490" y="230" width="270" height="100" rx="10" fill="none" stroke="#BD860E" stroke-width="2"/>
  <text x="625" y="270" text-anchor="middle" font-size="16" class="tool" fill="#BD860E">generate_main_image_title_plan</text>
  <text x="625" y="300" text-anchor="middle" font-size="16" class="tool" fill="#BD860E">run_trust_gap</text>

  <!-- arrow to result -->
  <line x1="800" y1="280" x2="890" y2="280" stroke="rgba(245,244,240,.5)" stroke-width="2" stroke-linecap="round" class="anim-flow"/>
  <polygon points="890,280 876,271 876,289" fill="rgba(245,244,240,.5)"/>

  <!-- Result -->
  <rect x="910" y="180" width="248" height="200" rx="10" fill="#3E9847" fill-opacity="0.18" stroke="#3E9847" stroke-width="2" class="anim-breathe"/>
  <text x="1034" y="260" text-anchor="middle" font-size="22">One promise:</text>
  <text x="1034" y="290" text-anchor="middle" font-size="22" fill="#3E9847">"5-in-1," everywhere</text>
</svg>
