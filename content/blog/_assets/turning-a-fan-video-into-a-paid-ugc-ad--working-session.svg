<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">The customer's own words, surfaced by the coach, become the one line the paid ad is built around.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="66" font-size="32" font-weight="600">Repost customer UGC as an ad, evidence-first</text>
  <text x="60" y="96" font-size="20" class="dim">Two rambling minutes hold one sentence that's actually the ad.</text>

  <rect x="60" y="220" width="240" height="140" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="180" y="280" text-anchor="middle" font-size="20" class="faint">Raw clip</text>
  <text x="180" y="308" text-anchor="middle" font-size="16" class="faint">+ comments, permissioned</text>

  <line x1="300" y1="290" x2="430" y2="290" class="hair"/>
  <polygon points="430,290 418,282 418,298" fill="rgba(245,244,240,.5)"/>

  <rect x="430" y="215" width="300" height="150" rx="10" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="580" y="270" text-anchor="middle" font-size="18" fill="#3E8FC4" class="tool" font-weight="600">ingest_evidence</text>
  <text x="580" y="300" text-anchor="middle" font-size="16" class="faint">finds the objection-defeating line</text>

  <line x1="730" y1="290" x2="870" y2="290" class="hair"/>
  <polygon points="870,290 858,282 858,298" fill="rgba(245,244,240,.5)"/>

  <rect x="870" y="205" width="270" height="170" rx="10" fill="#BD860E" fill-opacity="0.22" stroke="#E7A412" stroke-width="2"/>
  <text x="1005" y="255" text-anchor="middle" font-size="18" fill="#BD860E" class="tool" font-weight="600">generate_ugc_ad_plan</text>
  <text x="1005" y="285" text-anchor="middle" font-size="16" class="faint">script built around that</text>
  <text x="1005" y="307" text-anchor="middle" font-size="16" class="faint">one line, hooks + claims gated</text>

  <text x="60" y="460" font-size="18" class="faint">Higgsfield renders the plan; retention on that line proves it worked, not view count.</text>
</svg>
