<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">One hunch in, one protected beat out — that is the whole job of a real storyboard brief.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="66" font-size="32" font-weight="600">From vague hunch to directed ad plan</text>
  <text x="60" y="96" font-size="20" class="dim">"Make it feel like an unboxing" isn't a brief until one beat is protected.</text>

  <rect x="60" y="180" width="300" height="150" rx="12" fill="#CC4F42" fill-opacity="0.18" stroke="#CC4F42" stroke-width="2"/>
  <text x="210" y="240" text-anchor="middle" font-size="22" fill="#CC4F42" font-weight="600">"Do an unboxing ad"</text>
  <text x="210" y="272" text-anchor="middle" font-size="18" class="faint">a hunch, not a brief</text>

  <line x1="375" y1="255" x2="440" y2="255" class="hair anim-flow"/>
  <path d="M440 255 l-14 -8 l0 16 z" fill="rgba(245,244,240,.5)"/>

  <rect x="450" y="180" width="300" height="150" rx="12" fill="#BD860E" fill-opacity="0.22" stroke="#E7A412" stroke-width="2"/>
  <text x="600" y="240" text-anchor="middle" font-size="21" class="tool" fill="#BD860E" font-weight="600">generate_video</text>
  <text x="600" y="264" text-anchor="middle" font-size="21" class="tool" fill="#BD860E" font-weight="600">_storyboard</text>
  <text x="600" y="296" text-anchor="middle" font-size="16" class="faint">marketing-studio preset</text>

  <line x1="765" y1="255" x2="830" y2="255" class="hair anim-flow"/>
  <path d="M830 255 l-14 -8 l0 16 z" fill="rgba(245,244,240,.5)"/>

  <rect x="840" y="180" width="300" height="150" rx="12" fill="#3E9847" fill-opacity="0.2" stroke="#3E9847" stroke-width="2"/>
  <text x="990" y="234" text-anchor="middle" font-size="20" fill="#3E9847" font-weight="600">Protected beat:</text>
  <text x="990" y="262" text-anchor="middle" font-size="18" class="dim">the clip-on "it fits"</text>
  <text x="990" y="288" text-anchor="middle" font-size="18" class="dim">reaction shot</text>

  <text x="60" y="420" font-size="20" class="dim">The tool doesn't invent the beat — it forces the founder to name it first.</text>
  <text x="60" y="456" font-size="18" class="faint">Higgsfield renders the plan once the reference-kit product sheet is set.</text>
</svg>
