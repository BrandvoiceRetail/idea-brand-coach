<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Closing review request flow gaps means finding the moment with zero coverage, then adding a second touchpoint</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect x="40" y="270" width="190" height="130" rx="14" fill="#CC4F42" fill-opacity="0.16" stroke="#CC4F42" stroke-width="2"/>
  <text x="60" y="320" font-size="20" class="dim">One email</text>
  <text x="60" y="346" font-size="18" class="faint">fires at delivery</text>

  <line x1="230" y1="335" x2="278" y2="335" stroke="#BD860E" stroke-width="3" stroke-linecap="round"/>
  <polygon points="278,325 300,335 278,345" fill="#BD860E"/>

  <rect x="300" y="280" width="220" height="110" rx="14" fill="none" stroke="#BD860E" stroke-width="2"/>
  <text x="320" y="320" font-size="22" class="tool">get_funnel_coverage</text>
  <text x="320" y="346" font-size="18" class="faint">maps the Advocacy stage</text>

  <line x1="520" y1="335" x2="568" y2="335" stroke="#BD860E" stroke-width="3" stroke-linecap="round"/>
  <polygon points="568,325 590,335 568,345" fill="#BD860E"/>

  <rect x="590" y="270" width="220" height="130" rx="14" fill="#CC4F42" fill-opacity="0.16" stroke="#CC4F42" stroke-width="2"/>
  <text x="608" y="316" font-size="20" class="dim">Gap found:</text>
  <text x="608" y="342" font-size="18" class="faint">no usage-triggered ask</text>
  <text x="608" y="366" font-size="18" class="faint">after the first real trip</text>

  <line x1="810" y1="335" x2="858" y2="335" stroke="#BD860E" stroke-width="3" stroke-linecap="round"/>
  <polygon points="858,325 880,335 858,345" fill="#BD860E"/>

  <rect x="880" y="270" width="270" height="130" rx="14" fill="#3E9847" fill-opacity="0.16" stroke="#3E9847" stroke-width="2"/>
  <text x="900" y="312" font-size="20" class="tool">run_funnel_audit</text>
  <text x="900" y="342" font-size="18" class="faint">confirms it, then two</text>
  <text x="900" y="366" font-size="18" class="faint">touchpoints cover both moments</text>
</svg>
