<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">The search grid showed grey, the listing landed on orange — that mismatch, not the copy, was bouncing shoppers.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect x="48" y="90" width="504" height="495" rx="10" fill="#CC4F42" fill-opacity="0.08" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="80" y="140" font-size="22" fill="#CC4F42" letter-spacing="1">BEFORE — MISMATCHED</text>
  <rect x="110" y="190" width="180" height="140" rx="8" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="200" y="265" text-anchor="middle" font-size="18" class="dim">grey — grid</text>
  <line x1="200" y1="330" x2="200" y2="400" class="hair" stroke-dasharray="6 10"/>
  <rect x="310" y="190" width="180" height="140" rx="8" fill="#CC4F42" fill-opacity="0.2" stroke="#CC4F42" stroke-width="2" class="anim-breathe"/>
  <text x="400" y="265" text-anchor="middle" font-size="18" fill="#CC4F42">orange — page</text>
  <text x="300" y="470" text-anchor="middle" font-size="18" class="dim">
    <tspan x="300" dy="0">Click on grey.</tspan>
    <tspan x="300" dy="24">Land on orange.</tspan>
    <tspan x="300" dy="24">Bounce, confused.</tspan>
  </text>

  <line x1="574" y1="337" x2="626" y2="337" stroke="rgba(245,244,240,.5)" stroke-width="2" stroke-linecap="round"/>
  <polygon points="626,337 612,328 612,346" fill="rgba(245,244,240,.5)"/>

  <rect x="648" y="90" width="504" height="495" rx="10" fill="#3E9847" fill-opacity="0.08" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="680" y="140" font-size="22" fill="#3E9847" letter-spacing="1">AFTER — ONE VARIANT, PINNED</text>
  <rect x="810" y="220" width="180" height="140" rx="8" fill="#BD860E" fill-opacity="0.22" stroke="#BD860E" stroke-width="2"/>
  <text x="900" y="295" text-anchor="middle" font-size="18" fill="#BD860E">orange — grid + page</text>
  <text x="900" y="500" text-anchor="middle" font-size="18" class="dim">
    <tspan x="900" dy="0">Grid and landing page</tspan>
    <tspan x="900" dy="24">tell the same story.</tspan>
  </text>
</svg>
