<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">The number was never the question — the job of each step was</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="60" font-size="30" font-weight="600">Forty signups a week. Zero emails behind them.</text>
  <text x="48" y="90" font-size="20" class="dim">The fix was never a number — it was a shape, then a trigger.</text>

  <!-- step 1: input -->
  <rect x="48" y="260" width="220" height="130" rx="10" fill="rgba(204,79,66,.18)" stroke="#CC4F42" stroke-width="2"/>
  <text x="158" y="312" font-size="18" text-anchor="middle">40 signups/wk</text>
  <text x="158" y="338" font-size="16" text-anchor="middle" class="dim">0 emails sent</text>

  <line x1="268" y1="325" x2="342" y2="325" class="hair anim-flow"/>

  <!-- step 2 -->
  <rect x="342" y="252" width="234" height="136" rx="10" fill="rgba(189,134,14,.2)" stroke="#BD860E" stroke-width="2"/>
  <text x="459" y="300" font-size="16" text-anchor="middle" class="tool">create_email_sequence</text>
  <text x="459" y="326" font-size="15" text-anchor="middle" class="faint">5 steps, one job</text>
  <text x="459" y="348" font-size="15" text-anchor="middle" class="faint">each, not five guesses</text>

  <line x1="576" y1="325" x2="650" y2="325" class="hair anim-flow"/>

  <!-- step 3 -->
  <rect x="650" y="252" width="234" height="136" rx="10" fill="rgba(189,134,14,.2)" stroke="#BD860E" stroke-width="2"/>
  <text x="767" y="300" font-size="15" text-anchor="middle" class="tool">identify_decision_trigger</text>
  <text x="767" y="326" font-size="15" text-anchor="middle" class="faint">step 1 trigger:</text>
  <text x="767" y="348" font-size="15" text-anchor="middle" font-weight="700">momentum</text>

  <line x1="884" y1="325" x2="958" y2="325" class="hair anim-flow"/>

  <!-- step 4: output -->
  <rect x="958" y="252" width="194" height="136" rx="10" fill="rgba(62,152,71,.2)" stroke="#3E9847" stroke-width="2" class="anim-breathe"/>
  <text x="1055" y="306" font-size="16" text-anchor="middle">Email 1 extends</text>
  <text x="1055" y="330" font-size="16" text-anchor="middle">the moment,</text>
  <text x="1055" y="354" font-size="16" text-anchor="middle">not just thanks</text>

  <text x="48" y="460" font-size="18" class="faint">"How many emails" is unanswerable until each step has a defined job.</text>
</svg>
