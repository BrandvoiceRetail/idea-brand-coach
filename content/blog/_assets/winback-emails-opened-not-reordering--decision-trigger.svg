<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Fear of loss, not a bigger discount, is the trigger a winback email not converting is actually missing.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="66" font-size="32" font-weight="600">identify_decision_trigger: the one lever</text>
  <text x="60" y="96" font-size="20" class="dim">Opens are healthy. Clicks fall off a cliff after email one — that's a trigger gap, not a price gap.</text>

  <rect x="60" y="150" width="180" height="110" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="150" y="210" text-anchor="middle" font-size="20" class="faint">Permission</text>

  <rect x="270" y="150" width="180" height="110" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="360" y="210" text-anchor="middle" font-size="20" class="faint">Recognition</text>

  <rect x="480" y="150" width="180" height="110" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="570" y="210" text-anchor="middle" font-size="20" class="faint">Identity</text>

  <rect x="690" y="150" width="180" height="110" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="780" y="210" text-anchor="middle" font-size="20" class="faint">Belonging</text>

  <rect x="60" y="300" width="180" height="110" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="150" y="360" text-anchor="middle" font-size="20" class="faint">Momentum</text>

  <rect x="270" y="290" width="600" height="130" rx="10" fill="#BD860E" fill-opacity="0.22" stroke="#E7A412" stroke-width="2" class="anim-breathe"/>
  <text x="570" y="345" text-anchor="middle" font-size="26" fill="#BD860E" font-weight="600">Fear of Loss</text>
  <text x="570" y="378" text-anchor="middle" font-size="17" class="faint">"most dogs finish a bag by week five" — the real lever, not 20% off</text>

  <text x="60" y="480" font-size="20" class="dim">A 20% discount answers a price objection nobody raised.</text>
  <text x="60" y="520" font-size="18" class="faint">Rewrite around running out, and the discount becomes a footnote, not the pitch.</text>
</svg>
