<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Support scored fine on three pillars — the trust gap sat specifically in Authentic.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="66" font-size="32" font-weight="600">run_trust_gap: the four IDEA pillars</text>
  <text x="60" y="96" font-size="20" class="dim">Support content is accurate and polite. The gap is somewhere else entirely.</text>

  <text x="60" y="166" font-size="24" class="dim">Insight-Driven</text>
  <rect x="290" y="140" width="760" height="32" rx="6" fill="#3E9847" fill-opacity="0.22" stroke="#3E9847" stroke-width="2"/>
  <rect x="290" y="140" width="640" height="32" rx="6" fill="#3E9847"/>

  <text x="60" y="246" font-size="24" class="dim">Distinctive</text>
  <rect x="290" y="220" width="760" height="32" rx="6" fill="#3E9847" fill-opacity="0.22" stroke="#3E9847" stroke-width="2"/>
  <rect x="290" y="220" width="600" height="32" rx="6" fill="#3E9847"/>

  <text x="60" y="326" font-size="24" class="dim">Empathetic</text>
  <rect x="290" y="300" width="760" height="32" rx="6" fill="#3E9847" fill-opacity="0.22" stroke="#3E9847" stroke-width="2"/>
  <rect x="290" y="300" width="580" height="32" rx="6" fill="#3E9847"/>

  <text x="60" y="406" font-size="24" fill="#CC4F42" font-weight="600">Authentic</text>
  <rect x="290" y="380" width="760" height="32" rx="6" fill="#CC4F42" fill-opacity="0.22" stroke="#CC4F42" stroke-width="2" class="anim-breathe"/>
  <rect x="290" y="380" width="210" height="32" rx="6" fill="#CC4F42"/>
  <text x="1050" y="402" font-size="20" fill="#CC4F42" font-weight="600">the gap</text>

  <text x="60" y="500" font-size="20" class="dim">Support replies use generic corporate phrasing everywhere the brand's own voice is playful and direct.</text>
  <text x="60" y="536" font-size="18" class="faint">audit_asset flags the mismatch line by line, before a rewrite.</text>
</svg>
