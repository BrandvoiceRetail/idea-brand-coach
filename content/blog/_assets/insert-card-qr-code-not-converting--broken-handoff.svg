<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Scans are healthy. Signups are near zero. The missing step sits between them, not on the card</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="70" font-size="32" font-weight="600">Where the handoff actually breaks</text>
  <text x="48" y="100" font-size="20" class="dim">get_funnel_piece_metrics isolates the card; run_funnel_audit finds the gap</text>

  <!-- step 1: card, green (healthy) -->
  <rect x="50" y="270" width="230" height="120" rx="10" fill="rgba(62,152,71,.2)" stroke="#3E9847" stroke-width="2"/>
  <text x="165" y="320" font-size="20" text-anchor="middle" font-weight="600">QR scans</text>
  <text x="165" y="346" font-size="17" text-anchor="middle" class="faint">healthy, tracks units shipped</text>

  <!-- broken connector, red, dashed, no flow -->
  <line x1="280" y1="330" x2="380" y2="330" stroke="#CC4F42" stroke-width="3" stroke-dasharray="6 8"/>
  <text x="330" y="300" font-size="18" text-anchor="middle" fill="#CC4F42">no form</text>

  <!-- step 2: gap, red -->
  <rect x="380" y="255" width="230" height="150" rx="10" fill="rgba(204,79,66,.16)" stroke="#CC4F42" stroke-width="2"/>
  <text x="495" y="310" font-size="19" text-anchor="middle" font-weight="600" fill="#CC4F42">Landing page</text>
  <text x="495" y="334" font-size="16" text-anchor="middle" class="faint">bonus content,</text>
  <text x="495" y="356" font-size="16" text-anchor="middle" class="faint">no signup path</text>

  <!-- connector, gold, tool chip -->
  <line x1="610" y1="330" x2="690" y2="330" class="hair anim-flow"/>
  <text x="650" y="300" font-size="15" text-anchor="middle" class="tool" fill="#BD860E">run_funnel_audit</text>

  <!-- step 3: fixed page, gold -->
  <rect x="690" y="255" width="230" height="150" rx="10" fill="rgba(189,134,14,.2)" stroke="#BD860E" stroke-width="2"/>
  <text x="805" y="310" font-size="19" text-anchor="middle" font-weight="600">Form added</text>
  <text x="805" y="334" font-size="16" text-anchor="middle" class="faint">to the same page</text>

  <!-- connector -->
  <line x1="920" y1="330" x2="990" y2="330" class="hair anim-flow"/>

  <!-- step 4: signups, green -->
  <rect x="990" y="270" width="160" height="120" rx="10" fill="rgba(62,152,71,.2)" stroke="#3E9847" stroke-width="2"/>
  <text x="1070" y="320" font-size="18" text-anchor="middle" font-weight="600">Signups</text>
  <text x="1070" y="346" font-size="15" text-anchor="middle" class="faint">now track scans</text>

  <text x="50" y="480" font-size="20" class="faint">Scan-to-signup, not list growth, is the number that proves the handoff is fixed.</text>
</svg>
