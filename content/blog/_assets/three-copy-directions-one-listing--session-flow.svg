<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Building all three copy directions out fully, then comparing, beats rewriting on a hunch one theory at a time.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="64" font-size="32" font-weight="600">Three theories in. One tested direction out.</text>

  <!-- Step 1: input -->
  <rect x="48" y="260" width="220" height="150" rx="14" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="158" y="325" font-size="24" text-anchor="middle" class="dim">3 competing</text>
  <text x="158" y="355" font-size="24" text-anchor="middle" class="dim">theories</text>

  <!-- connector 1 -->
  <path d="M 268 335 L 326 335" class="hair anim-flow"/>
  <path d="M 310 326 L 326 335 L 310 344" class="hair"/>

  <!-- Step 2: coach tool -->
  <rect x="336" y="260" width="220" height="150" rx="14" fill="#BD860E" fill-opacity="0.2" stroke="#BD860E" stroke-width="2"/>
  <text x="446" y="330" font-size="21" text-anchor="middle" class="tool" fill="#F5F4F0">generate_concepts</text>
  <text x="446" y="362" font-size="18" text-anchor="middle" class="faint">builds all three</text>

  <!-- connector 2 -->
  <path d="M 556 335 L 614 335" class="hair anim-flow"/>
  <path d="M 598 326 L 614 335 L 598 344" class="hair"/>

  <!-- Step 3: output, three built directions -->
  <rect x="624" y="260" width="220" height="150" rx="14" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="734" y="325" font-size="24" text-anchor="middle" class="dim">3 built-out</text>
  <text x="734" y="355" font-size="24" text-anchor="middle" class="dim">directions</text>

  <!-- connector 3 -->
  <path d="M 844 335 L 902 335" class="hair anim-flow"/>
  <path d="M 886 326 L 902 335 L 886 344" class="hair"/>

  <!-- Step 4: highlight, the merged direction chosen -->
  <rect x="912" y="230" width="220" height="210" rx="14" fill="#BD860E" fill-opacity="0.25" stroke="#BD860E" stroke-width="2" class="anim-breathe"/>
  <text x="1022" y="310" font-size="23" text-anchor="middle" font-weight="600">Merged</text>
  <text x="1022" y="340" font-size="23" text-anchor="middle" font-weight="600">direction</text>
  <text x="1022" y="370" font-size="17" text-anchor="middle" class="faint">chosen from</text>
  <text x="1022" y="392" font-size="17" text-anchor="middle" class="faint">comparison, not instinct</text>

  <text x="600" y="580" font-size="20" text-anchor="middle" class="faint">Rewriting one theory at a time changes more than one variable per pass — comparison isolates what's true.</text>
</svg>
