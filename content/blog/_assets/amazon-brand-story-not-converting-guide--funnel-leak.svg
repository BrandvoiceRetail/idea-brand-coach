<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Amazon brand story and storefront About live in the Consideration stage — a generic story is exactly where shoppers bounce back to the bullets.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="72" font-size="20" class="faint" letter-spacing="1">THE 5-STAGE FUNNEL</text>

  <line x1="48" y1="325" x2="1152" y2="325" class="hair anim-flow" />

  <!-- Awareness -->
  <rect x="48" y="280" width="180" height="90" rx="8" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="138" y="332" text-anchor="middle" font-size="24">Awareness</text>

  <!-- Consideration (highlight) -->
  <rect x="279" y="266" width="180" height="118" rx="8" fill="#BD860E" fill-opacity="0.22" stroke="#BD860E" stroke-width="2" class="anim-breathe"/>
  <text x="369" y="318" text-anchor="middle" font-size="24">Consideration</text>
  <text x="369" y="346" text-anchor="middle" font-size="18" class="dim">
    <tspan x="369" dy="0">Brand Story ·</tspan>
    <tspan x="369" dy="22">Storefront About</tspan>
  </text>

  <!-- Purchase decision -->
  <rect x="510" y="280" width="180" height="90" rx="8" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="600" y="332" text-anchor="middle" font-size="22">Purchase</text>

  <!-- Retention -->
  <rect x="741" y="280" width="180" height="90" rx="8" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="831" y="332" text-anchor="middle" font-size="24">Retention</text>

  <!-- Advocacy -->
  <rect x="972" y="280" width="180" height="90" rx="8" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="1062" y="332" text-anchor="middle" font-size="24">Advocacy</text>

  <!-- leak marker -->
  <line x1="369" y1="384" x2="369" y2="440" stroke="#CC4F42" stroke-width="2" stroke-linecap="round"/>
  <polygon points="369,440 359,458 379,458" fill="#CC4F42" fill-opacity="0.35" stroke="#CC4F42" stroke-width="2"/>
  <text x="369" y="500" text-anchor="middle" font-size="20" class="dim">
    <tspan x="369" dy="0">A generic story bounces shoppers</tspan>
    <tspan x="369" dy="26">back to the bullets they already read</tspan>
  </text>
</svg>
