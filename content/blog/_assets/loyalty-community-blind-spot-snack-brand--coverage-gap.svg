<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Reviews and referrals are covered, but loyalty_community sits at zero coverage, the position with no repeat-buyer touchpoint at all.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="600" y="70" text-anchor="middle" font-size="32" font-weight="600">Advocacy stage coverage: get_funnel_coverage</text>

  <rect x="90" y="180" width="300" height="220" rx="16" fill="#3E9847" fill-opacity="0.18" stroke="#3E9847" stroke-width="2"/>
  <text x="240" y="250" text-anchor="middle" font-size="20" font-weight="600" class="tool">review_request</text>
  <text x="240" y="276" text-anchor="middle" font-size="20" font-weight="600" class="tool">_flow</text>
  <text x="240" y="330" text-anchor="middle" font-size="20" fill="#3E9847" font-weight="700">covered</text>

  <rect x="450" y="180" width="300" height="220" rx="16" fill="#3E9847" fill-opacity="0.18" stroke="#3E9847" stroke-width="2"/>
  <text x="600" y="263" text-anchor="middle" font-size="20" font-weight="600" class="tool">referral_program</text>
  <text x="600" y="330" text-anchor="middle" font-size="20" fill="#3E9847" font-weight="700">covered</text>

  <rect x="810" y="180" width="300" height="220" rx="16" fill="#CC4F42" fill-opacity="0.18" stroke="#CC4F42" stroke-width="2" class="anim-breathe"/>
  <text x="960" y="250" text-anchor="middle" font-size="20" font-weight="600" class="tool">loyalty_community</text>
  <text x="960" y="330" text-anchor="middle" font-size="22" fill="#CC4F42" font-weight="700">zero coverage</text>
  <text x="960" y="358" text-anchor="middle" font-size="17" class="dim">the blank position</text>

  <text x="600" y="480" text-anchor="middle" font-size="20" class="dim">Your best repeat buyer is the only one nobody talks to on purpose.</text>

  <text x="600" y="580" text-anchor="middle" font-size="18" class="faint tool">run_funnel_audit ranks the gap against your highest-LTV segment</text>
</svg>
