<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Three pillars score fine — the trust gap sits entirely in Empathetic, which is why more certifications never moved conversion.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="60" font-size="30" font-weight="700">run_trust_gap scorecard</text>

  <!-- Insight-Driven -->
  <text x="48" y="140" font-size="24">Insight-Driven</text>
  <rect x="330" y="112" width="800" height="36" rx="4" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <rect x="330" y="112" width="700" height="36" rx="4" fill="#3E8FC4" fill-opacity="0.22" stroke="#3E8FC4" stroke-width="2"/>

  <!-- Distinctive -->
  <text x="48" y="240" font-size="24">Distinctive</text>
  <rect x="330" y="212" width="800" height="36" rx="4" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <rect x="330" y="212" width="640" height="36" rx="4" fill="#3E8FC4" fill-opacity="0.22" stroke="#3E8FC4" stroke-width="2"/>

  <!-- Empathetic (weak, red) -->
  <text x="48" y="340" font-size="24" fill="#CC4F42">Empathetic</text>
  <rect x="330" y="312" width="800" height="36" rx="4" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <rect x="330" y="312" width="150" height="36" rx="4" fill="#CC4F42" fill-opacity="0.28" stroke="#CC4F42" stroke-width="2" class="anim-breathe"/>
  <text x="510" y="339" font-size="20" fill="#CC4F42">the gap</text>

  <!-- Authentic -->
  <text x="48" y="440" font-size="24">Authentic</text>
  <rect x="330" y="412" width="800" height="36" rx="4" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <rect x="330" y="412" width="680" height="36" rx="4" fill="#3E8FC4" fill-opacity="0.22" stroke="#3E8FC4" stroke-width="2"/>

  <text x="330" y="510" font-size="20" class="dim">Three certifications reinforced Insight-Driven again. Empathetic never moved.</text>
</svg>
