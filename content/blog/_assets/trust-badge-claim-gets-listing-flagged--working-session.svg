<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Check the claim before the badge ships — not after Amazon flags it</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="70" font-size="32" font-weight="600">Check the claim before the design brief goes out</text>
  <text x="48" y="100" font-size="20" class="dim">One overclaim, caught before it costs a listing suppression</text>

  <rect x="60" y="260" width="220" height="120" rx="10" fill="rgba(204,79,66,.2)" stroke="#CC4F42" stroke-width="2"/>
  <text x="170" y="315" font-size="18" text-anchor="middle" fill="#CC4F42">"Clinically</text>
  <text x="170" y="341" font-size="18" text-anchor="middle" fill="#CC4F42">Proven" badge</text>

  <line x1="280" y1="320" x2="335" y2="320" class="hair anim-flow"/>

  <rect x="335" y="250" width="230" height="140" rx="10" fill="rgba(189,134,14,.2)" stroke="#BD860E" stroke-width="2"/>
  <text x="450" y="305" font-size="18" text-anchor="middle" class="tool">publish_filter</text>
  <text x="450" y="327" font-size="18" text-anchor="middle" class="tool">_check</text>
  <text x="450" y="352" font-size="16" text-anchor="middle" class="faint">claim flagged</text>

  <line x1="565" y1="320" x2="620" y2="320" class="hair anim-flow"/>

  <rect x="620" y="250" width="240" height="140" rx="10" fill="rgba(189,134,14,.2)" stroke="#BD860E" stroke-width="2"/>
  <text x="740" y="298" font-size="18" text-anchor="middle" class="tool">identify_decision</text>
  <text x="740" y="320" font-size="18" text-anchor="middle" class="tool">_trigger</text>
  <text x="740" y="346" font-size="16" text-anchor="middle" class="faint">fear_of_loss, not proof</text>

  <line x1="860" y1="320" x2="915" y2="320" class="hair anim-flow"/>

  <rect x="915" y="260" width="230" height="120" rx="10" fill="rgba(62,152,71,.22)" stroke="#3E9847" stroke-width="2"/>
  <text x="1030" y="315" font-size="18" text-anchor="middle">Honest hour-count</text>
  <text x="1030" y="341" font-size="18" text-anchor="middle">badge ships</text>

  <text x="60" y="460" font-size="20" class="faint">A lab measurement stated honestly beats a claim that gets a listing suppressed.</text>
</svg>
