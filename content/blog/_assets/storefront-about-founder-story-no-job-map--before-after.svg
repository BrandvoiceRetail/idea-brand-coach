<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Hannah's About page ends on her own resolution before the rewrite, and on the customer's job to be done after</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect x="48" y="90" width="504" height="495" rx="10" fill="#CC4F42" fill-opacity="0.08" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="80" y="140" font-size="22" class="dim" letter-spacing="1">BEFORE, ENDS ON HANNAH</text>
  <rect x="90" y="190" width="424" height="140" rx="8" fill="#3E8FC4" fill-opacity="0.18" stroke="#3E8FC4" stroke-width="2"/>
  <text x="110" y="240" font-size="18" class="dim">
    <tspan x="110" dy="0">A chaotic year. A system.</tspan>
    <tspan x="110" dy="26">A decision to sell it.</tspan>
  </text>
  <rect x="90" y="360" width="424" height="90" rx="8" fill="#CC4F42" fill-opacity="0.22" stroke="#CC4F42" stroke-width="2"/>
  <text x="110" y="400" font-size="19">"So I built this for myself."</text>
  <text x="110" y="425" font-size="17" class="faint">Ends on the founder.</text>

  <line x1="574" y1="337" x2="626" y2="337" stroke="rgba(245,244,240,.5)" stroke-width="2" stroke-linecap="round"/>
  <polygon points="626,337 612,328 612,346" fill="rgba(245,244,240,.5)"/>

  <rect x="648" y="90" width="504" height="495" rx="10" fill="#3E9847" fill-opacity="0.08" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="680" y="140" font-size="22" class="dim" letter-spacing="1">AFTER, ENDS ON THE JOB</text>
  <rect x="690" y="190" width="424" height="140" rx="8" fill="#3E8FC4" fill-opacity="0.18" stroke="#3E8FC4" stroke-width="2"/>
  <text x="710" y="240" font-size="18" class="dim">
    <tspan x="710" dy="0">Same chaotic year.</tspan>
    <tspan x="710" dy="26">Same true story.</tspan>
  </text>
  <rect x="690" y="360" width="424" height="90" rx="8" fill="#BD860E" fill-opacity="0.22" stroke="#BD860E" stroke-width="2" class="anim-breathe"/>
  <text x="710" y="392" font-size="18">
    <tspan x="710" dy="0">"Don't let this be the year</tspan>
    <tspan x="710" dy="24">you gave up again."</tspan>
  </text>
  <text x="900" y="500" text-anchor="middle" font-size="18" class="dim">The story becomes proof, not the point.</text>
</svg>
