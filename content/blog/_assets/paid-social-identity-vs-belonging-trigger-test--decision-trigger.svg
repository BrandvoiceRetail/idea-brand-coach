<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Belonging, not identity, is the decision trigger this candle audience keeps pointing at.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="66" font-size="32" font-weight="600">identify_decision_trigger: six candidates, one lever</text>
  <text x="60" y="96" font-size="20" class="dim">The ad's copy is written for one trigger. The comments are voting for another.</text>

  <rect x="60" y="160" width="180" height="110" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="150" y="220" text-anchor="middle" font-size="20" class="faint">Permission</text>

  <rect x="260" y="160" width="180" height="110" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="350" y="220" text-anchor="middle" font-size="20" class="faint">Recognition</text>

  <rect x="460" y="160" width="180" height="110" rx="10" fill="#CC4F42" fill-opacity="0.18" stroke="#CC4F42" stroke-width="2"/>
  <text x="550" y="212" text-anchor="middle" font-size="20" fill="#CC4F42" font-weight="600">Identity</text>
  <text x="550" y="240" text-anchor="middle" font-size="16" class="faint">what the copy assumes</text>

  <rect x="660" y="150" width="220" height="130" rx="10" fill="#BD860E" fill-opacity="0.22" stroke="#E7A412" stroke-width="2" class="anim-breathe"/>
  <text x="770" y="205" text-anchor="middle" font-size="24" fill="#BD860E" font-weight="600">Belonging</text>
  <text x="770" y="238" text-anchor="middle" font-size="16" class="faint">what the comments show</text>

  <rect x="900" y="160" width="180" height="110" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="990" y="220" text-anchor="middle" font-size="20" class="faint">Momentum</text>

  <rect x="460" y="330" width="380" height="90" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="650" y="382" text-anchor="middle" font-size="20" class="faint">Fear of Loss</text>

  <text x="60" y="500" font-size="20" class="dim">Comments say "sending this," "for my sister" — that's belonging talking, not identity.</text>
  <text x="60" y="540" font-size="18" class="faint">design_test splits identity vs. belonging headlines before either replaces the ad.</text>
</svg>
