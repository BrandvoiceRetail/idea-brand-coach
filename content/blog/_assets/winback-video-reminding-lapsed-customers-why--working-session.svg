<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">A winback video email replaces the discount pitch with the felt "after" state customers forgot.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="60" font-size="32" font-weight="600">From text-only ask to winback video email</text>
  <text x="48" y="90" font-size="20" class="dim">Identity needs to be seen, not summarized in a subject line</text>

  <rect x="50" y="270" width="180" height="120" rx="10" fill="rgba(62,143,196,.2)" stroke="#3E8FC4" stroke-width="2"/>
  <text x="140" y="325" font-size="18" text-anchor="middle">Lapsed buyer,</text>
  <text x="140" y="351" font-size="18" text-anchor="middle">text-only ask</text>

  <line x1="230" y1="330" x2="270" y2="330" class="hair anim-flow"/>

  <rect x="270" y="260" width="230" height="140" rx="10" fill="rgba(189,134,14,.2)" stroke="#BD860E" stroke-width="2"/>
  <text x="385" y="310" font-size="18" text-anchor="middle" class="tool">identify_decision</text>
  <text x="385" y="332" font-size="18" text-anchor="middle" class="tool">_trigger</text>
  <text x="385" y="358" font-size="16" text-anchor="middle" class="faint">identity, not price</text>

  <line x1="500" y1="330" x2="540" y2="330" class="hair anim-flow"/>

  <rect x="540" y="260" width="240" height="140" rx="10" fill="rgba(189,134,14,.2)" stroke="#BD860E" stroke-width="2"/>
  <text x="660" y="310" font-size="18" text-anchor="middle" class="tool">generate_video</text>
  <text x="660" y="332" font-size="18" text-anchor="middle" class="tool">_storyboard</text>
  <text x="660" y="358" font-size="16" text-anchor="middle" class="faint">before/after felt state</text>

  <line x1="780" y1="330" x2="820" y2="330" class="hair anim-flow"/>

  <rect x="820" y="260" width="200" height="140" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="920" y="315" font-size="17" text-anchor="middle" class="dim">Higgsfield renders</text>
  <text x="920" y="341" font-size="16" text-anchor="middle" class="faint">storyboard-image, one job</text>

  <line x1="1020" y1="330" x2="1060" y2="330" class="hair anim-flow"/>

  <rect x="1060" y="270" width="100" height="120" rx="10" fill="rgba(62,152,71,.22)" stroke="#3E9847" stroke-width="2"/>
  <text x="1110" y="325" font-size="17" text-anchor="middle">Video</text>
  <text x="1110" y="349" font-size="17" text-anchor="middle">reminder</text>

  <text x="50" y="470" font-size="20" class="faint">The discount moves to the end — a nudge after the feeling is back, not the whole pitch.</text>
</svg>
