<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">The star rating looks fine, but reviews are failing to prove the Empathetic pillar — that's the real gap.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- title -->
  <text x="48" y="70" font-size="32" font-weight="600">run_trust_gap: which pillar do your reviews prove?</text>
  <text x="48" y="100" font-size="22" class="dim">4.6★ average, flat CVR — the average hides which pillar is empty</text>

  <!-- axis -->
  <line x1="330" y1="150" x2="330" y2="560" class="hair"/>

  <!-- bar 1: Insight-Driven (blue, strong) -->
  <text x="310" y="195" font-size="24" text-anchor="end" class="dim">Insight-Driven</text>
  <rect x="330" y="170" width="620" height="50" rx="4" fill="#3E8FC4" fill-opacity="0.22" stroke="#3E8FC4" stroke-width="2"/>
  <text x="965" y="203" font-size="20" class="dim">82</text>

  <!-- bar 2: Distinctive (blue, strong) -->
  <text x="310" y="285" font-size="24" text-anchor="end" class="dim">Distinctive</text>
  <rect x="330" y="260" width="580" height="50" rx="4" fill="#3E8FC4" fill-opacity="0.22" stroke="#3E8FC4" stroke-width="2"/>
  <text x="925" y="293" font-size="20" class="dim">76</text>

  <!-- bar 3: Empathetic (RED, the gap) -->
  <text x="310" y="375" font-size="26" text-anchor="end" font-weight="600">Empathetic</text>
  <rect x="330" y="350" width="220" height="50" rx="4" fill="#CC4F42" fill-opacity="0.28" stroke="#CC4F42" stroke-width="3" class="anim-breathe"/>
  <text x="565" y="383" font-size="22" font-weight="600">31</text>

  <!-- bar 4: Authentic (blue, strong) -->
  <text x="310" y="465" font-size="24" text-anchor="end" class="dim">Authentic</text>
  <rect x="330" y="440" width="600" height="50" rx="4" fill="#3E8FC4" fill-opacity="0.22" stroke="#3E8FC4" stroke-width="2"/>
  <text x="945" y="473" font-size="20" class="dim">79</text>

  <!-- annotation callout -->
  <path d="M 610 350 L 610 320 L 760 320" class="hair"/>
  <text x="770" y="325" font-size="20" fill="#CC4F42">the gap: no review speaks to the buyer's real worry</text>

  <text x="48" y="600" font-size="19" class="faint">Fix: mine and curate reviews that close the Empathetic gap, not just collect more of them.</text>
</svg>
