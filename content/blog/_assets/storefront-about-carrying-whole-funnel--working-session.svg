<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-labelledby="t">
  <title id="t">get_funnel_coverage shows Raj's About tile is fine — Brand Story and Founder Content sections don't exist yet</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <line x1="288" y1="200" x2="336" y2="200" class="hair" marker-end="url(#arrow)"/>
  <line x1="576" y1="200" x2="624" y2="200" class="hair" marker-end="url(#arrow)"/>
  <line x1="864" y1="200" x2="912" y2="200" class="hair" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="rgba(245,244,240,.4)"/>
    </marker>
  </defs>

  <rect x="48" y="140" width="240" height="120" rx="10" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="168" y="192" text-anchor="middle" font-size="20">
    <tspan x="168" dy="0">About tile:</tspan>
    <tspan x="168" dy="26">polished, three rewrites</tspan>
  </text>

  <rect x="336" y="140" width="240" height="120" rx="10" fill="#BD860E" fill-opacity="0.2" stroke="#BD860E" stroke-width="2"/>
  <text x="456" y="204" text-anchor="middle" font-size="20" class="tool">get_funnel_</text>
  <text x="456" y="228" text-anchor="middle" font-size="20" class="tool">coverage</text>

  <rect x="624" y="140" width="240" height="120" rx="10" fill="#CC4F42" fill-opacity="0.2" stroke="#CC4F42" stroke-width="2"/>
  <text x="744" y="192" text-anchor="middle" font-size="18">
    <tspan x="744" dy="0">Brand Story:</tspan>
    <tspan x="744" dy="24" class="dim">missing</tspan>
  </text>

  <rect x="912" y="140" width="240" height="120" rx="10" fill="#CC4F42" fill-opacity="0.2" stroke="#CC4F42" stroke-width="2" class="anim-breathe"/>
  <text x="1032" y="192" text-anchor="middle" font-size="18">
    <tspan x="1032" dy="0">Founder content:</tspan>
    <tspan x="1032" dy="24" class="dim">missing</tspan>
  </text>

  <text x="600" y="330" text-anchor="middle" font-size="19" class="faint">A coverage map, not another rewrite of the one tile that already works.</text>
</svg>
