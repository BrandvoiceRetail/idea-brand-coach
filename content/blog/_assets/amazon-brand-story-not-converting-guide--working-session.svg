<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-labelledby="t2">
  <title id="t2">The coach audits your Brand Story against the avatar's real objection before it rewrites a single beat.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- arrows -->
  <line x1="288" y1="200" x2="336" y2="200" class="hair" marker-end="url(#arrow)"/>
  <line x1="576" y1="200" x2="624" y2="200" class="hair" marker-end="url(#arrow)"/>
  <line x1="864" y1="200" x2="912" y2="200" class="hair" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="rgba(245,244,240,.4)"/>
    </marker>
  </defs>

  <!-- Input -->
  <rect x="48" y="140" width="240" height="120" rx="10" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="168" y="192" text-anchor="middle" font-size="20">
    <tspan x="168" dy="0">Your current</tspan>
    <tspan x="168" dy="26">Brand Story</tspan>
  </text>

  <!-- Tool 1 -->
  <rect x="336" y="140" width="240" height="120" rx="10" fill="#BD860E" fill-opacity="0.2" stroke="#BD860E" stroke-width="2"/>
  <text x="456" y="196" text-anchor="middle" font-size="20" class="tool">audit_asset</text>
  <text x="456" y="222" text-anchor="middle" font-size="16" class="dim">vs. the avatar's #1 objection</text>

  <!-- Tool 2 -->
  <rect x="624" y="140" width="240" height="120" rx="10" fill="#BD860E" fill-opacity="0.2" stroke="#BD860E" stroke-width="2"/>
  <text x="744" y="196" text-anchor="middle" font-size="18" class="tool">
    <tspan x="744" dy="0">generate_aplus_</tspan>
    <tspan x="744" dy="22">content_plan</tspan>
  </text>

  <!-- Output -->
  <rect x="912" y="140" width="240" height="120" rx="10" fill="#3E9847" fill-opacity="0.2" stroke="#3E9847" stroke-width="2"/>
  <text x="1032" y="192" text-anchor="middle" font-size="20">
    <tspan x="1032" dy="0">Five beats, the</tspan>
    <tspan x="1032" dy="26">objection covered</tspan>
  </text>
</svg>
