<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Enrollment only moves once the momentum-framed callout ships against a clean control — guessing never proved it.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="56" font-size="28" font-weight="600">Subscribe &amp; Save enrollment — test vs. control</text>

  <line x1="90" y1="500" x2="1140" y2="500" class="hair"/>
  <line x1="90" y1="120" x2="90" y2="500" class="hair"/>
  <text x="60" y="480" font-size="16" class="faint">wk 1</text>
  <text x="600" y="520" text-anchor="middle" font-size="16" class="faint">wk 4 — callout ships</text>
  <text x="1110" y="480" font-size="16" class="faint">wk 8</text>

  <polyline points="90,420 300,415 520,418 620,416 780,412 1000,408 1140,405" fill="none" stroke="#3E8FC4" stroke-width="2.5" stroke-linecap="round"/>
  <text x="1100" y="392" font-size="16" fill="#3E8FC4">control — flat</text>

  <polyline points="90,420 300,415 520,418 620,340 780,290 1000,250 1140,225" fill="none" stroke="#BD860E" stroke-width="3" stroke-linecap="round" class="anim-flow"/>
  <text x="1000" y="205" font-size="16" fill="#BD860E">test — momentum callout</text>

  <circle cx="620" cy="416" r="7" fill="#BD860E" class="anim-breathe"/>
  <line x1="620" y1="416" x2="620" y2="470" class="hair" stroke-dasharray="4 8"/>
  <text x="620" y="560" text-anchor="middle" font-size="18" class="dim">one variable, one control, fixed before launch</text>
</svg>
