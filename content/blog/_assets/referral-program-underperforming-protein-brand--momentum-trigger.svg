<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Redemption climbs when the referral ask lands inside the momentum window, not on a fixed post-purchase day.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="600" y="72" text-anchor="middle" font-size="32" font-weight="600">Which trigger actually drives this referral?</text>

  <rect x="72" y="136" width="320" height="104" rx="16" class="hair"/>
  <text x="232" y="194" text-anchor="middle" font-size="24" class="faint">Permission</text>

  <rect x="440" y="136" width="320" height="104" rx="16" class="hair"/>
  <text x="600" y="194" text-anchor="middle" font-size="24" class="faint">Recognition</text>

  <rect x="808" y="136" width="320" height="104" rx="16" class="hair"/>
  <text x="968" y="194" text-anchor="middle" font-size="24" class="faint">Identity</text>

  <rect x="72" y="272" width="320" height="104" rx="16" class="hair"/>
  <text x="232" y="330" text-anchor="middle" font-size="24" class="faint">Belonging</text>

  <rect x="440" y="272" width="320" height="104" rx="16" fill="#BD860E" fill-opacity="0.22" stroke="#BD860E" stroke-width="2"/>
  <text x="600" y="322" text-anchor="middle" font-size="26" font-weight="700">Momentum</text>
  <text x="600" y="352" text-anchor="middle" font-size="18" class="dim">the operative trigger</text>

  <rect x="808" y="272" width="320" height="104" rx="16" class="hair"/>
  <text x="968" y="330" text-anchor="middle" font-size="24" class="faint">Fear of Loss</text>

  <text x="600" y="452" text-anchor="middle" font-size="20" class="dim">Kofi's ask fires on a fixed day-10 delay.</text>
  <text x="600" y="482" text-anchor="middle" font-size="20" class="dim">The personal-best moment that would make a friend share is already gone by then.</text>

  <text x="600" y="580" text-anchor="middle" font-size="18" class="faint tool">build_avatar_stage (S3 triggers) retimes the ask to the moment, not the calendar</text>
</svg>
