<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">The paid social hook mismatch: an identity hook answers a question this already-active buyer never asked — momentum does</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="58" font-size="30" font-weight="700">Same buyer, wrong hook</text>

  <!-- BEFORE panel -->
  <rect x="48" y="120" width="520" height="460" rx="16" fill="rgba(204,79,66,.12)" stroke="#CC4F42" stroke-width="2"/>
  <text x="308" y="164" text-anchor="middle" font-size="24" font-weight="700" fill="#CC4F42">BEFORE: identity hook</text>
  <text x="308" y="220" text-anchor="middle" font-size="20" class="dim">"Become the person who</text>
  <text x="308" y="250" text-anchor="middle" font-size="20" class="dim">finally did this."</text>
  <line x1="108" y1="290" x2="508" y2="290" class="hair"/>
  <text x="308" y="330" text-anchor="middle" font-size="18" class="dim">Audience: already trains,</text>
  <text x="308" y="358" text-anchor="middle" font-size="18" class="dim">already owns equipment</text>
  <rect x="148" y="410" width="320" height="60" rx="12" fill="none" stroke="#CC4F42" stroke-width="2"/>
  <text x="308" y="448" text-anchor="middle" font-size="22" font-weight="700" fill="#CC4F42">0.9% CTR</text>

  <!-- AFTER panel -->
  <rect x="632" y="120" width="520" height="460" rx="16" fill="rgba(62,152,71,.12)" stroke="#3E9847" stroke-width="2"/>
  <text x="892" y="164" text-anchor="middle" font-size="24" font-weight="700" fill="#3E9847">AFTER: momentum hook</text>
  <text x="892" y="220" text-anchor="middle" font-size="20" class="dim">"Don't let today be the</text>
  <text x="892" y="250" text-anchor="middle" font-size="20" class="dim">day you skip it."</text>
  <line x1="692" y1="290" x2="1092" y2="290" class="hair"/>
  <text x="892" y="330" text-anchor="middle" font-size="18" class="dim">Same audience, real friction</text>
  <text x="892" y="358" text-anchor="middle" font-size="18" class="dim">named instead of ignored</text>
  <rect x="732" y="410" width="320" height="60" rx="12" fill="rgba(189,134,14,.22)" stroke="#BD860E" stroke-width="2" class="anim-breathe"/>
  <text x="892" y="448" text-anchor="middle" font-size="22" font-weight="700">test vs. 1.6% benchmark</text>

  <text x="600" y="630" text-anchor="middle" font-size="20" class="dim">The one changed thing: which decision trigger the hook answers.</text>
</svg>
