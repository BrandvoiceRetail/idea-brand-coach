<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Three IDEA pillars score fine. Empathetic sits far below the others — that gap is what's costing the sale.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="66" font-size="32" font-weight="600">run_trust_gap: the four-pillar read</text>
  <text x="60" y="96" font-size="20" class="dim">One weak pillar explains a copy problem the other three don't.</text>

  <!-- track reference lines -->
  <line x1="380" y1="150" x2="1140" y2="150" class="hair"/>
  <line x1="380" y1="620" x2="1140" y2="620" class="hair"/>

  <!-- row 1: Insight-Driven, 78 -->
  <text x="60" y="184" font-size="24">Insight-Driven</text>
  <rect x="380" y="162" width="593" height="40" rx="4" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="990" y="189" font-size="20" class="dim">78</text>

  <!-- row 2: Distinctive, 72 -->
  <text x="60" y="304" font-size="24">Distinctive</text>
  <rect x="380" y="282" width="547" height="40" rx="4" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="944" y="309" font-size="20" class="dim">72</text>

  <!-- row 3: Empathetic, 34 - the gap, red -->
  <text x="60" y="424" font-size="24">Empathetic</text>
  <rect x="380" y="402" width="258" height="40" rx="4" fill="#CC4F42" fill-opacity="0.25" stroke="#CC4F42" stroke-width="2"/>
  <text x="655" y="429" font-size="20" fill="#CC4F42">34 — the gap</text>

  <!-- row 4: Authentic, 80 -->
  <text x="60" y="544" font-size="24">Authentic</text>
  <rect x="380" y="522" width="608" height="40" rx="4" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="1005" y="549" font-size="20" class="dim">80</text>

  <text x="380" y="600" font-size="18" class="faint">Illustrative scores. Rewrite the weak pillar only — the other three stay.</text>
</svg>
