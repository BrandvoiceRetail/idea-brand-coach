<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">design_test bounds the bet to six weeks with a stop/scale decision fixed before spend, instead of a quarter committed on a hunch.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="66" font-size="28" font-weight="600">design_test: bound the bet before you spend it</text>
  <text x="60" y="94" font-size="18" class="faint">Lead-quality signal (illustrative) — the metric is fixed before week 1, not read into afterward.</text>

  <line x1="100" y1="520" x2="1100" y2="520" class="hair"/>
  <text x="100" y="550" font-size="18" class="faint">wk 1</text>
  <text x="320" y="550" font-size="18" class="faint">wk 3</text>
  <text x="600" y="550" text-anchor="middle" font-size="18" fill="#BD860E" font-weight="600">wk 6</text>
  <text x="860" y="550" font-size="18" class="faint">wk 9</text>
  <text x="1080" y="550" font-size="18" class="faint">wk 12</text>

  <path d="M140,460 C300,442 460,410 600,382" fill="none" stroke="#BD860E" stroke-width="2" stroke-linecap="round" class="anim-flow"/>
  <circle cx="600" cy="382" r="7" fill="#BD860E"/>
  <line x1="600" y1="382" x2="600" y2="520" stroke="rgba(245,244,240,.35)" stroke-width="2" stroke-dasharray="6 6"/>

  <path d="M600,382 C740,360 820,320 900,300" fill="none" stroke="#3E9847" stroke-width="2" stroke-linecap="round" stroke-opacity="0.7"/>
  <text x="915" y="300" font-size="18" fill="#3E9847">clears bar → scale to full quarter</text>

  <path d="M600,382 C740,410 820,440 900,460" fill="none" stroke="#CC4F42" stroke-width="2" stroke-linecap="round" stroke-opacity="0.7"/>
  <text x="915" y="465" font-size="18" fill="#CC4F42">flat → stop, budget protected</text>

  <text x="600" y="200" text-anchor="middle" font-size="22" fill="#BD860E" font-weight="600">decision point — fixed before week 1</text>
  <text x="60" y="620" font-size="18" class="dim">Four to six pieces, one metric, six weeks. The stop condition is decided now, not when the numbers look discouraging.</text>
</svg>
