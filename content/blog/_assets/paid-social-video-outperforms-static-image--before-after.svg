<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">In a video ad vs image ad test on the same placement, the still can't show the one motion that proves the product — the video can</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="58" font-size="30" font-weight="700">Same backpack, same placement</text>

  <!-- BEFORE: static image -->
  <rect x="48" y="120" width="520" height="460" rx="16" fill="rgba(204,79,66,.12)" stroke="#CC4F42" stroke-width="2"/>
  <text x="308" y="164" text-anchor="middle" font-size="24" font-weight="700" fill="#CC4F42">BEFORE: static photo</text>
  <rect x="148" y="200" width="320" height="180" rx="10" fill="rgba(245,244,240,.06)" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="308" y="298" text-anchor="middle" font-size="18" class="dim">clean shot, backpack full</text>
  <text x="308" y="326" text-anchor="middle" font-size="18" class="dim">can't show it collapsing</text>
  <rect x="148" y="410" width="320" height="60" rx="12" fill="none" stroke="#CC4F42" stroke-width="2"/>
  <text x="308" y="448" text-anchor="middle" font-size="22" font-weight="700" fill="#CC4F42">0.6% CTR</text>

  <!-- AFTER: video -->
  <rect x="632" y="120" width="520" height="460" rx="16" fill="rgba(62,152,71,.12)" stroke="#3E9847" stroke-width="2"/>
  <text x="892" y="164" text-anchor="middle" font-size="24" font-weight="700" fill="#3E9847">AFTER: video, one collapse scene</text>
  <rect x="732" y="200" width="320" height="180" rx="10" fill="rgba(245,244,240,.06)" stroke="rgba(245,244,240,.16)" stroke-width="2" class="anim-flow"/>
  <text x="892" y="278" text-anchor="middle" font-size="18" class="dim">full &#8594; collapsing &#8594; flat</text>
  <text x="892" y="306" text-anchor="middle" font-size="18" class="dim">the motion is the proof</text>
  <rect x="732" y="410" width="320" height="60" rx="12" fill="rgba(189,134,14,.22)" stroke="#BD860E" stroke-width="2" class="anim-breathe"/>
  <text x="892" y="448" text-anchor="middle" font-size="22" font-weight="700">closes toward 1.3% benchmark</text>

  <text x="600" y="630" text-anchor="middle" font-size="20" class="dim">The one changed thing: showing the collapse, not describing it.</text>
</svg>
