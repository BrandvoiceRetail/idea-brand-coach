<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Opening on doubt instead of praise is what makes influencer UGC read as discovery, not an ad.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="60" font-size="32" font-weight="600">Same clip, one flipped opening line</text>

  <rect x="60" y="110" width="520" height="420" rx="12" fill="#CC4F42" fill-opacity="0.12" stroke="#CC4F42" stroke-width="2"/>
  <text x="320" y="150" text-anchor="middle" font-size="24" fill="#CC4F42" font-weight="600">Praise-first</text>
  <text x="320" y="220" text-anchor="middle" font-size="20" fill="#CC4F42" font-weight="600">"I love these lights..."</text>
  <text x="320" y="256" text-anchor="middle" font-size="17" class="faint">reads as sponsored in one line</text>
  <text x="320" y="360" text-anchor="middle" font-size="18" class="dim">0.6% CTR &#8212; audience files it and scrolls</text>

  <rect x="620" y="110" width="520" height="420" rx="12" fill="#3E9847" fill-opacity="0.12" stroke="#3E9847" stroke-width="2"/>
  <text x="880" y="150" text-anchor="middle" font-size="24" fill="#3E9847" font-weight="600">Skeptic-flip</text>
  <text x="880" y="220" text-anchor="middle" font-size="20" fill="#3E9847" font-weight="600">"I thought a reflector strip</text>
  <text x="880" y="248" text-anchor="middle" font-size="20" fill="#3E9847" font-weight="600">was enough, but..."</text>
  <text x="880" y="288" text-anchor="middle" font-size="17" class="faint">names the doubt tied to fear_of_loss</text>
  <text x="880" y="360" text-anchor="middle" font-size="18" class="dim">praise still lands &#8212; earned in the second half</text>
</svg>
