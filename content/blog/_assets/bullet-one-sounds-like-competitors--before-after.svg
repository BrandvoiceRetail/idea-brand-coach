<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Four listings shared one bullet-one claim — real amazon listing differentiation meant staking out language none of them use</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="66" font-size="30" font-weight="700">Bullet one, before and after generate_signature</text>
  <text x="48" y="96" font-size="20" class="dim">Amazon listing differentiation means a claim none of the four listings already own.</text>

  <!-- BEFORE panel -->
  <rect x="48" y="150" width="460" height="390" rx="14" fill="#CC4F42" fill-opacity="0.14" stroke="#CC4F42" stroke-width="2"/>
  <text x="78" y="196" font-size="20" fill="#CC4F42" font-weight="700">BEFORE — 4 listings, 1 sentence</text>
  <text x="78" y="250" font-size="19" class="dim">
    <tspan x="78" dy="0">"Premium stainless steel</tspan>
    <tspan x="78" dy="26">construction built to last"</tspan>
  </text>
  <line x1="78" y1="300" x2="478" y2="300" class="hair"/>
  <text x="78" y="340" font-size="19" fill="#CC4F42">Shared by 3 competitors above her —</text>
  <text x="78" y="368" font-size="19" fill="#CC4F42">and Anwen's kit, unchanged.</text>
  <text x="78" y="500" font-size="18" fill="#CC4F42">A materials claim. Not a brand claim.</text>

  <!-- connector + tool chip -->
  <line x1="508" y1="325" x2="530" y2="325" class="hair"/>
  <rect x="530" y="294" width="140" height="62" rx="10" fill="rgba(189,134,14,.16)" stroke="#BD860E" stroke-width="2" class="anim-breathe"/>
  <text x="600" y="326" text-anchor="middle" class="tool" font-size="13">generate</text>
  <text x="600" y="344" text-anchor="middle" class="tool" font-size="13">_signature</text>
  <line x1="670" y1="325" x2="692" y2="325" class="hair"/>
  <polygon points="692,325 682,319 682,331" fill="rgba(245,244,240,.4)"/>

  <!-- AFTER panel -->
  <rect x="692" y="150" width="460" height="390" rx="14" fill="#3E9847" fill-opacity="0.16" stroke="#3E9847" stroke-width="2"/>
  <text x="722" y="196" font-size="20" fill="#3E9847" font-weight="700">AFTER — hers alone</text>
  <text x="722" y="250" font-size="20" class="dim">
    <tspan x="722" dy="0">"Ends the ratio-</tspan>
    <tspan x="722" dy="28">guessing that ruined</tspan>
    <tspan x="722" dy="28">your last two setups"</tspan>
  </text>
  <text x="722" y="440" font-size="18" fill="#3E9847">Checked against every listing above her</text>
  <text x="722" y="465" font-size="18" fill="#3E9847">via generate_positioning_moves — clear.</text>

  <text x="48" y="630" font-size="18" class="faint">Illustrative bullets. The claim moved from what the material is to what the brand solves.</text>
</svg>
