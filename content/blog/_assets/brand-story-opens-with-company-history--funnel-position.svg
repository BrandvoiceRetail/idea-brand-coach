<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Panel one has one job: earn panel two. A founding-history hook loses four of five shoppers before it does.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="60" font-size="32" font-weight="600">Five-beat Brand Story: where shoppers drop</text>
  <text x="60" y="90" class="dim" font-size="20">80% leave at panel one when the hook is founding history.</text>

  <rect x="60" y="140" width="180" height="130" rx="10" fill="#CC4F42" fill-opacity="0.22" stroke="#CC4F42" stroke-width="2"/>
  <text x="150" y="195" text-anchor="middle" font-size="20" fill="#F5F4F0" font-weight="600">Panel 1</text>
  <text x="150" y="222" text-anchor="middle" font-size="16" class="faint">"Founded 2019"</text>
  <text x="150" y="245" text-anchor="middle" font-size="16" fill="#CC4F42">80% drop here</text>

  <line x1="255" y1="205" x2="290" y2="205" class="hair anim-flow"/>

  <rect x="300" y="140" width="150" height="130" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="375" y="195" text-anchor="middle" font-size="18" class="faint">Panel 2</text>
  <text x="375" y="220" text-anchor="middle" font-size="14" class="faint">distinctive</text>
  <text x="375" y="240" text-anchor="middle" font-size="14" class="faint">material</text>

  <rect x="470" y="140" width="150" height="130" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="545" y="195" text-anchor="middle" font-size="18" class="faint">Panel 3</text>

  <rect x="640" y="140" width="150" height="130" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="715" y="195" text-anchor="middle" font-size="18" class="faint">Panel 4</text>

  <rect x="810" y="140" width="150" height="130" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="885" y="195" text-anchor="middle" font-size="18" class="faint">Panel 5</text>

  <text x="60" y="360" font-size="24" font-weight="600" fill="#BD860E">The fix: swap the hook, not the history</text>
  <rect x="60" y="400" width="180" height="130" rx="10" fill="#BD860E" fill-opacity="0.22" stroke="#E7A412" stroke-width="2" class="anim-breathe"/>
  <text x="150" y="455" text-anchor="middle" font-size="18" fill="#BD860E" font-weight="600">Panel 1</text>
  <text x="150" y="480" text-anchor="middle" font-size="14" class="faint">signature line:</text>
  <text x="150" y="500" text-anchor="middle" font-size="14" class="faint">"will this hold up?"</text>

  <text x="60" y="580" font-size="20" class="dim">generate_signature builds the hook. History moves to panel three.</text>
</svg>
