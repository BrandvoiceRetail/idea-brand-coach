<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Diagnose in this order: rule out the click side, read the trust gap, mine evidence, rewrite, then test.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="72" font-size="32" font-weight="600">The working session, in order</text>
  <text x="60" y="104" font-size="20" class="dim">Skip a step and you rewrite copy that was never broken.</text>

  <!-- connectors -->
  <line x1="298" y1="330" x2="342" y2="330" class="hair" marker-end="url(#arrow)"/>
  <line x1="580" y1="330" x2="624" y2="330" class="hair" marker-end="url(#arrow)"/>
  <line x1="862" y1="330" x2="906" y2="330" class="hair" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="rgba(245,244,240,.4)"/>
    </marker>
  </defs>

  <!-- step 1: before, red -->
  <rect x="60" y="255" width="238" height="150" rx="14" fill="#CC4F42" fill-opacity="0.18" stroke="#CC4F42" stroke-width="2"/>
  <text x="179" y="310" font-size="20" text-anchor="middle" class="dim">Sessions healthy.</text>
  <text x="179" y="336" font-size="20" text-anchor="middle" class="dim">CVR flat.</text>
  <text x="179" y="374" font-size="18" text-anchor="middle" class="faint">Bullets suspected first</text>

  <!-- step 2: tool chip, gold -->
  <rect x="342" y="255" width="238" height="150" rx="14" fill="#BD860E" fill-opacity="0.18" stroke="#BD860E" stroke-width="2"/>
  <text x="461" y="322" font-size="22" text-anchor="middle" class="tool">run_trust_gap</text>
  <text x="461" y="356" font-size="18" text-anchor="middle" class="faint">finds the weak pillar</text>

  <!-- step 3: tool chip, gold -->
  <rect x="624" y="255" width="238" height="150" rx="14" fill="#BD860E" fill-opacity="0.18" stroke="#BD860E" stroke-width="2"/>
  <text x="743" y="312" font-size="20" text-anchor="middle" class="tool">build_avatar_stage</text>
  <text x="743" y="340" font-size="20" text-anchor="middle" class="tool">ingest_evidence</text>
  <text x="743" y="374" font-size="18" text-anchor="middle" class="faint">real words, real objection</text>

  <!-- step 4: after, green -->
  <rect x="906" y="255" width="234" height="150" rx="14" fill="#3E9847" fill-opacity="0.18" stroke="#3E9847" stroke-width="2"/>
  <text x="1023" y="310" font-size="20" text-anchor="middle" class="dim">Rewritten bullet,</text>
  <text x="1023" y="336" font-size="20" text-anchor="middle" class="dim">tested not shipped</text>
  <text x="1023" y="374" font-size="18" text-anchor="middle" class="tool">design_test</text>
</svg>
