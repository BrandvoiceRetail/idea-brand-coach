<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">A main image and title tested as two separate assets send a mismatched signal — tested as one positioning statement, they hold a CTR gain instead of decaying.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- BEFORE panel -->
  <rect x="48" y="90" width="504" height="495" rx="10" fill="#CC4F42" fill-opacity="0.08" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="80" y="140" font-size="22" fill="#CC4F42" letter-spacing="1">BEFORE — TWO SEPARATE ASSETS</text>

  <rect x="110" y="200" width="280" height="90" rx="8" fill="#CC4F42" fill-opacity="0.18" stroke="#CC4F42" stroke-width="2"/>
  <text x="250" y="252" text-anchor="middle" font-size="24">Main Image</text>

  <line x1="250" y1="290" x2="250" y2="360" class="hair" stroke-dasharray="6 10"/>

  <rect x="110" y="360" width="280" height="90" rx="8" fill="#CC4F42" fill-opacity="0.18" stroke="#CC4F42" stroke-width="2"/>
  <text x="250" y="412" text-anchor="middle" font-size="24">Title</text>

  <text x="250" y="500" text-anchor="middle" font-size="18" class="dim">
    <tspan x="250" dy="0">Chosen for looks.</tspan>
    <tspan x="250" dy="24">Chosen for keywords.</tspan>
    <tspan x="250" dy="24">Shopper reads a mismatch.</tspan>
  </text>

  <!-- arrow between panels -->
  <line x1="574" y1="337" x2="626" y2="337" stroke="rgba(245,244,240,.5)" stroke-width="2" stroke-linecap="round"/>
  <polygon points="626,337 612,328 612,346" fill="rgba(245,244,240,.5)"/>

  <!-- AFTER panel -->
  <rect x="648" y="90" width="504" height="495" rx="10" fill="#3E9847" fill-opacity="0.08" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="680" y="140" font-size="22" fill="#3E9847" letter-spacing="1">AFTER — ONE STATEMENT</text>

  <rect x="710" y="220" width="380" height="130" rx="10" fill="#BD860E" fill-opacity="0.22" stroke="#BD860E" stroke-width="2"/>
  <text x="900" y="278" text-anchor="middle" font-size="24">Main Image + Title</text>
  <text x="900" y="308" text-anchor="middle" font-size="18" class="dim">One positioning statement</text>

  <rect x="770" y="400" width="260" height="52" rx="26" fill="none" stroke="#BD860E" stroke-width="2"/>
  <text x="900" y="434" text-anchor="middle" font-size="18" class="tool" fill="#BD860E">generate_main_image_title_plan</text>

  <text x="900" y="500" text-anchor="middle" font-size="18" class="dim">
    <tspan x="900" dy="0">Same difference, said twice —</tspan>
    <tspan x="900" dy="24">once in the image, once in the</tspan>
    <tspan x="900" dy="24">first 80 characters of the title.</tspan>
  </text>
</svg>
