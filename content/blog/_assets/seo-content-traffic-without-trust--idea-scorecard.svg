<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">The trust gap sits in the Empathetic pillar — the other three score fine.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="60" font-size="32" font-weight="600">run_trust_gap on the roundup post, not just the listing</text>
  <text x="60" y="90" font-size="20" class="dim">Page-one rankings, thousands of visits — and one pillar still failing.</text>

  <text x="60" y="160" font-size="22" class="dim">Insight-Driven</text>
  <rect x="260" y="138" width="720" height="34" rx="4" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <rect x="260" y="138" width="612" height="34" rx="4" fill="#3E8FC4" fill-opacity="0.22" stroke="#3E8FC4" stroke-width="2"/>
  <text x="1000" y="163" font-size="18" class="faint">85</text>

  <text x="60" y="230" font-size="22" class="dim">Distinctive</text>
  <rect x="260" y="208" width="720" height="34" rx="4" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <rect x="260" y="208" width="533" height="34" rx="4" fill="#3E8FC4" fill-opacity="0.22" stroke="#3E8FC4" stroke-width="2"/>
  <text x="1000" y="233" font-size="18" class="faint">74</text>

  <text x="60" y="300" font-size="22" fill="#CC4F42" font-weight="600">Empathetic</text>
  <rect x="260" y="278" width="720" height="34" rx="4" fill="none" stroke="#CC4F42" stroke-width="2"/>
  <rect x="260" y="278" width="216" height="34" rx="4" fill="#CC4F42" fill-opacity="0.28" stroke="#CC4F42" stroke-width="2" class="anim-breathe"/>
  <text x="1000" y="303" font-size="18" fill="#CC4F42" font-weight="600">30</text>

  <text x="60" y="370" font-size="22" class="dim">Authentic</text>
  <rect x="260" y="348" width="720" height="34" rx="4" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <rect x="260" y="348" width="576" height="34" rx="4" fill="#3E8FC4" fill-opacity="0.22" stroke="#3E8FC4" stroke-width="2"/>
  <text x="1000" y="373" font-size="18" class="faint">80</text>

  <text x="60" y="460" font-size="20" class="dim">Answers "which product," never "why this feels the way it feels at 2am."</text>
  <text x="60" y="500" font-size="18" class="faint">Keep the ranking structure. Rewrite the opening around the missing pillar.</text>
</svg>
