<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Amazon variation selector abandonment happens one step before checkout — not at the buy box itself.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="60" font-size="28" font-weight="600">The five-stage funnel — where this leak actually sits</text>

  <line x1="60" y1="360" x2="1140" y2="360" class="hair"/>

  <rect x="60" y="300" width="180" height="120" rx="8" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="150" y="365" text-anchor="middle" font-size="18" class="faint">Awareness</text>

  <rect x="272" y="300" width="180" height="120" rx="8" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="362" y="365" text-anchor="middle" font-size="18" class="faint">Consideration</text>

  <rect x="484" y="270" width="270" height="180" rx="8" fill="#BD860E" fill-opacity="0.2" stroke="#BD860E" stroke-width="2"/>
  <text x="619" y="330" text-anchor="middle" font-size="18" fill="#BD860E">Purchase Decision</text>
  <rect x="514" y="350" width="210" height="60" rx="6" fill="#CC4F42" fill-opacity="0.25" stroke="#CC4F42" stroke-width="2" class="anim-breathe"/>
  <text x="619" y="386" text-anchor="middle" font-size="16" fill="#CC4F42">variant selector — the leak</text>

  <rect x="826" y="300" width="180" height="120" rx="8" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="916" y="365" text-anchor="middle" font-size="18" class="faint">Retention</text>

  <rect x="1038" y="300" width="102" height="120" rx="8" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="1089" y="365" text-anchor="middle" font-size="16" class="faint">Advocacy</text>

  <text x="60" y="500" font-size="20" class="dim">Checkout looks clean. The dropdown, one step earlier, is where shoppers actually leave.</text>
  <text x="60" y="535" font-size="18" class="faint">A parent guessing wrong on age range closes the tab before the buy box ever loads.</text>
</svg>
