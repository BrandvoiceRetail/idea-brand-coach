<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">The leak sits at Purchase Decision — shoppers arrive, add to cart, then stop before paying</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="70" font-size="32" font-weight="600">Where the funnel actually leaks</text>
  <text x="48" y="100" font-size="20" class="dim">Five stages, one stage carrying the friction</text>

  <!-- stage strip -->
  <line x1="90" y1="330" x2="1110" y2="330" class="hair"/>

  <!-- Awareness -->
  <rect x="70" y="290" width="180" height="80" rx="8" fill="rgba(62,143,196,.2)" stroke="#3E8FC4" stroke-width="2"/>
  <text x="160" y="335" font-size="22" text-anchor="middle">Awareness</text>

  <!-- Consideration -->
  <rect x="290" y="290" width="180" height="80" rx="8" fill="rgba(62,143,196,.2)" stroke="#3E8FC4" stroke-width="2"/>
  <text x="380" y="335" font-size="22" text-anchor="middle">Consideration</text>

  <!-- Purchase Decision (highlight, gold, red leak) -->
  <rect x="510" y="270" width="220" height="120" rx="10" fill="rgba(189,134,14,.22)" stroke="#BD860E" stroke-width="3" class="anim-breathe"/>
  <text x="620" y="320" font-size="24" text-anchor="middle" font-weight="600">Purchase</text>
  <text x="620" y="348" font-size="24" text-anchor="middle" font-weight="600">Decision</text>

  <!-- red leak marker -->
  <circle cx="740" cy="270" r="10" fill="#CC4F42"/>
  <text x="758" y="255" font-size="20" fill="#CC4F42">added to cart, never paid</text>

  <!-- Retention -->
  <rect x="770" y="290" width="180" height="80" rx="8" fill="rgba(62,143,196,.2)" stroke="#3E8FC4" stroke-width="2"/>
  <text x="860" y="335" font-size="22" text-anchor="middle">Retention</text>

  <!-- Advocacy -->
  <rect x="990" y="290" width="140" height="80" rx="8" fill="rgba(62,143,196,.2)" stroke="#3E8FC4" stroke-width="2"/>
  <text x="1060" y="335" font-size="22" text-anchor="middle">Advocacy</text>

  <!-- annotation callout -->
  <text x="510" y="440" font-size="20" class="faint">Trust badges, urgency copy, shipping cost, return policy, and the</text>
  <text x="510" y="466" font-size="20" class="faint">variant selector all live here — one of them is the actual leak.</text>
</svg>
