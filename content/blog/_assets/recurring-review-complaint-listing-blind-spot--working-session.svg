<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Reading every 3-star review alone hides the pattern — ingest_evidence finds it, identify_decision_trigger tells you how to fix it</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="72" font-size="32" font-weight="700">Fix a listing from reviews: read the pattern, not one comment</text>
  <text x="48" y="102" font-size="20" class="dim">One recurring 3-star complaint, read as a set, becomes the whole diagnosis.</text>

  <!-- box 1: the leak -->
  <rect x="48" y="270" width="200" height="110" rx="10" fill="#CC4F42" fill-opacity="0.2" stroke="#CC4F42" stroke-width="2"/>
  <text x="148" y="316" text-anchor="middle" font-size="22">
    <tspan x="148" dy="0">Every 3-star</tspan>
    <tspan x="148" dy="26">read alone</tspan>
  </text>

  <line x1="248" y1="325" x2="282" y2="325" class="hair"/>
  <polygon points="282,325 272,319 272,331" fill="rgba(245,244,240,.4)"/>

  <!-- chip 1: ingest_evidence -->
  <rect x="282" y="294" width="140" height="62" rx="10" fill="rgba(189,134,14,.16)" stroke="#BD860E" stroke-width="2"/>
  <text x="352" y="332" text-anchor="middle" class="tool" font-size="15">ingest_evidence</text>

  <line x1="422" y1="325" x2="456" y2="325" class="hair"/>
  <polygon points="456,325 446,319 446,331" fill="rgba(245,244,240,.4)"/>

  <!-- box 2: pattern confirmed -->
  <rect x="456" y="270" width="200" height="110" rx="10" fill="#3E8FC4" fill-opacity="0.18" stroke="#3E8FC4" stroke-width="2"/>
  <text x="556" y="316" text-anchor="middle" font-size="22">
    <tspan x="556" dy="0">Pattern confirmed</tspan>
    <tspan x="556" dy="26" font-size="18" class="dim">6 months, same gap</tspan>
  </text>

  <line x1="656" y1="325" x2="690" y2="325" class="hair"/>
  <polygon points="690,325 680,319 680,331" fill="rgba(245,244,240,.4)"/>

  <!-- chip 2: identify_decision_trigger -->
  <rect x="690" y="294" width="230" height="62" rx="10" fill="rgba(189,134,14,.16)" stroke="#BD860E" stroke-width="2"/>
  <text x="805" y="332" text-anchor="middle" class="tool" font-size="14">identify_decision_trigger</text>

  <line x1="920" y1="325" x2="954" y2="325" class="hair"/>
  <polygon points="954,325 944,319 944,331" fill="rgba(245,244,240,.4)"/>

  <!-- box 3: fixed bullet -->
  <rect x="954" y="270" width="198" height="110" rx="10" fill="#3E9847" fill-opacity="0.2" stroke="#3E9847" stroke-width="2" class="anim-breathe"/>
  <text x="1053" y="316" text-anchor="middle" font-size="22">
    <tspan x="1053" dy="0">Permission-framed</tspan>
    <tspan x="1053" dy="26">bullet</tspan>
  </text>

  <text x="48" y="470" font-size="18" class="faint">Illustrative pattern. Six months of stable complaint volume, read once as a set, not twelve times separately.</text>
</svg>
