<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Detailed on craftsmanship, silent on sensitive ears — the Empathetic pillar is the gap the audit finds.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="60" font-size="32" font-weight="600">audit_asset: Brand Story vs. the real avatar</text>
  <text x="60" y="90" class="dim" font-size="20">Detailed about sourcing and craft. Silent on sensitive ears.</text>

  <text x="60" y="150" font-size="22">Insight-Driven</text>
  <rect x="260" y="130" width="620" height="30" rx="4" fill="#3E9847" fill-opacity="0.2" stroke="#3E9847" stroke-width="2"/>
  <rect x="260" y="130" width="520" height="30" rx="4" fill="#3E9847"/>

  <text x="60" y="220" font-size="22">Distinctive</text>
  <rect x="260" y="200" width="620" height="30" rx="4" fill="#3E9847" fill-opacity="0.2" stroke="#3E9847" stroke-width="2"/>
  <rect x="260" y="200" width="480" height="30" rx="4" fill="#3E9847"/>

  <text x="60" y="290" font-size="22" fill="#CC4F42" font-weight="600">Empathetic</text>
  <rect x="260" y="270" width="620" height="30" rx="4" fill="#CC4F42" fill-opacity="0.22" stroke="#CC4F42" stroke-width="2" class="anim-breathe"/>
  <rect x="260" y="270" width="140" height="30" rx="4" fill="#CC4F42"/>
  <text x="920" y="292" font-size="18" fill="#CC4F42">the gap: no mention of the fear</text>

  <text x="60" y="360" font-size="22">Authentic</text>
  <rect x="260" y="340" width="620" height="30" rx="4" fill="#3E9847" fill-opacity="0.2" stroke="#3E9847" stroke-width="2"/>
  <rect x="260" y="340" width="460" height="30" rx="4" fill="#3E9847"/>

  <text x="60" y="440" font-size="20" class="dim">A thorough module about the wrong things still leaves the real objection unanswered.</text>
  <text x="60" y="475" class="tool faint" font-size="18">audit_asset checks the asset against the avatar's objections, not a quality checklist.</text>
</svg>
