<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Elena's featured reviews praised cork — her buyers were relieved about grip and smell instead.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="66" font-size="30" font-weight="700">Featured vocabulary vs. real vocabulary</text>
  <text x="48" y="96" font-size="20" class="dim">build_avatar_stage's S1 pass counts what buyers actually said.</text>

  <!-- BEFORE -->
  <rect x="48" y="150" width="500" height="390" rx="14" fill="#CC4F42" fill-opacity="0.14" stroke="#CC4F42" stroke-width="2"/>
  <text x="78" y="196" font-size="20" fill="#CC4F42" font-weight="700">FEATURED — Elena's five picks</text>
  <text x="78" y="250" font-size="19" class="dim">
    <tspan x="78" dy="0">"Beautiful eco-friendly</tspan>
    <tspan x="78" dy="26">cork surface."</tspan>
  </text>
  <line x1="78" y1="300" x2="518" y2="300" class="hair"/>
  <text x="78" y="340" font-size="19" fill="#CC4F42">"Cork" and "sustainable": 5 mentions</text>
  <text x="78" y="500" font-size="18" fill="#CC4F42">Elena's language. Not her buyers'.</text>

  <!-- connector + tool chip -->
  <line x1="548" y1="325" x2="572" y2="325" class="hair"/>
  <rect x="572" y="285" width="150" height="80" rx="10" fill="rgba(189,134,14,.16)" stroke="#BD860E" stroke-width="2" class="anim-breathe"/>
  <text x="647" y="315" text-anchor="middle" class="tool" font-size="13">build_avatar</text>
  <text x="647" y="333" text-anchor="middle" class="tool" font-size="13">_stage: S1</text>
  <line x1="722" y1="325" x2="746" y2="325" class="hair anim-flow"/>
  <polygon points="746,325 736,319 736,331" fill="rgba(245,244,240,.4)"/>

  <!-- AFTER -->
  <rect x="746" y="150" width="406" height="390" rx="14" fill="#3E9847" fill-opacity="0.16" stroke="#3E9847" stroke-width="2"/>
  <text x="776" y="196" font-size="20" fill="#3E9847" font-weight="700">ACTUAL — full review set</text>
  <text x="776" y="250" font-size="19" class="dim">
    <tspan x="776" dy="0">"Doesn't smell, grips</tspan>
    <tspan x="776" dy="26">even when I'm sweating."</tspan>
  </text>
  <text x="776" y="440" font-size="18" fill="#3E9847">"Grip" and "smell": 3x more</text>
  <text x="776" y="465" font-size="18" fill="#3E9847">frequent than any materials word.</text>

  <text x="48" y="630" font-size="18" class="faint">Same review pool, counted honestly instead of scanned for the story Elena wanted to tell.</text>
</svg>
