<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">A blended 4.3-star average looks fine, but the strength-focused segment reveals review_request_flow as the weakest link</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect x="48" y="120" width="500" height="472" rx="12" fill="#3E9847" fill-opacity="0.16" stroke="#3E9847" stroke-width="2"/>
  <text x="76" y="168" font-size="26" font-weight="600" class="dim">Blended average</text>
  <text x="76" y="240" font-size="32" font-weight="600">4.3 stars</text>
  <text x="76" y="290" font-size="20" class="faint">All buyers averaged together.</text>
  <text x="76" y="316" font-size="20" class="faint">Looks solid on the dashboard.</text>

  <rect x="652" y="120" width="500" height="472" rx="12" fill="#CC4F42" fill-opacity="0.16" stroke="#CC4F42" stroke-width="2"/>
  <text x="680" y="168" font-size="26" font-weight="600" class="dim">Strength-segment audit</text>
  <text x="680" y="238" font-size="24" font-weight="600">review_request_flow</text>
  <text x="680" y="272" font-size="20">is the weakest link</text>
  <text x="680" y="316" font-size="20" class="faint">Invisible in the blended number.</text>

  <line x1="562" y1="356" x2="638" y2="356" stroke="#BD860E" stroke-width="3" stroke-linecap="round" class="anim-flow"/>
  <polygon points="638,344 662,356 638,368" fill="#BD860E"/>

  <rect x="330" y="52" width="540" height="48" rx="24" fill="#BD860E" fill-opacity="0.2" stroke="#BD860E" stroke-width="2"/>
  <text x="600" y="82" font-size="20" text-anchor="middle" font-weight="600" class="tool">run_funnel_audit, per avatar</text>
</svg>
