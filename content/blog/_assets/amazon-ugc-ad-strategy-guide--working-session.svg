<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">A working session moves from diagnosis to plan to one testable claim, never straight from problem to a new video</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="72" font-size="32" font-weight="700">One hypothesis, one test &#8212; not three concepts at once</text>

  <!-- Step 1: input -->
  <rect x="48" y="280" width="220" height="140" rx="16" class="hair" fill="rgba(62,143,196,.16)" stroke="#3E8FC4"/>
  <text x="158" y="335" text-anchor="middle" font-size="22" fill="#F5F4F0" font-weight="600">CTR fading,</text>
  <text x="158" y="365" text-anchor="middle" font-size="22" fill="#F5F4F0" font-weight="600">no clear cause</text>

  <path d="M 268 350 L 316 350" class="hair" marker-end="url(#arrow)"/>

  <!-- Step 2: coach tool -->
  <rect x="316" y="270" width="240" height="160" rx="16" fill="rgba(189,134,14,.18)" stroke="#BD860E" stroke-width="2"/>
  <text x="436" y="330" text-anchor="middle" class="tool" font-size="21" fill="#F5F4F0">identify_</text>
  <text x="436" y="358" text-anchor="middle" class="tool" font-size="21" fill="#F5F4F0">decision_trigger</text>
  <text x="436" y="400" text-anchor="middle" font-size="18" class="faint">names the lever</text>

  <path d="M 556 350 L 604 350" class="hair" marker-end="url(#arrow)"/>

  <!-- Step 3: coach tool -->
  <rect x="604" y="270" width="220" height="160" rx="16" fill="rgba(189,134,14,.18)" stroke="#BD860E" stroke-width="2"/>
  <text x="714" y="340" text-anchor="middle" class="tool" font-size="21" fill="#F5F4F0">design_test</text>
  <text x="714" y="382" text-anchor="middle" font-size="18" class="faint">one hypothesis,</text>
  <text x="714" y="406" text-anchor="middle" font-size="18" class="faint">one change</text>

  <path d="M 824 350 L 872 350" class="hair" marker-end="url(#arrow)"/>

  <!-- Step 4: output -->
  <rect x="872" y="280" width="280" height="140" rx="16" class="hair" fill="rgba(62,152,71,.18)" stroke="#3E9847"/>
  <text x="1012" y="335" text-anchor="middle" font-size="22" fill="#F5F4F0" font-weight="600">one clean</text>
  <text x="1012" y="365" text-anchor="middle" font-size="22" fill="#F5F4F0" font-weight="600">before/after read</text>

  <text x="48" y="500" font-size="20" class="dim">Three untested concepts on the same budget give you three unreadable results.</text>
  <text x="48" y="530" font-size="20" class="dim">One diagnosed hypothesis gives you one you can actually act on.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="rgba(245,244,240,.4)"/>
    </marker>
  </defs>
</svg>
