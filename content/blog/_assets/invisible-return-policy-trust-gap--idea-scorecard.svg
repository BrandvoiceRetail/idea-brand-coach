<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Empathetic is the weak pillar — the return policy proof never reaches the buyer before they decide</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="66" font-size="32" font-weight="600">run_trust_gap: Ines's cookware listing</text>
  <text x="60" y="96" font-size="20" class="dim">A 90-day return window exists — it just never reaches the buyer.</text>

  <line x1="380" y1="150" x2="1140" y2="150" class="hair"/>
  <line x1="380" y1="620" x2="1140" y2="620" class="hair"/>

  <!-- row 1: Insight-Driven, 81 -->
  <text x="60" y="184" font-size="24">Insight-Driven</text>
  <rect x="380" y="162" width="480" height="40" rx="4" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="877" y="189" font-size="20" class="dim">81</text>

  <!-- row 2: Distinctive, 74 -->
  <text x="60" y="304" font-size="24">Distinctive</text>
  <rect x="380" y="282" width="439" height="40" rx="4" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="836" y="309" font-size="20" class="dim">74</text>

  <!-- row 3: Empathetic, 33 - the gap, red, breathing -->
  <text x="60" y="424" font-size="24">Empathetic</text>
  <rect x="380" y="402" width="196" height="40" rx="4" fill="#CC4F42" fill-opacity="0.25" stroke="#CC4F42" stroke-width="2" class="anim-breathe"/>
  <text x="593" y="429" font-size="20" fill="#CC4F42">33 — the gap</text>

  <!-- row 4: Authentic, 77 -->
  <text x="60" y="544" font-size="24">Authentic</text>
  <rect x="380" y="522" width="457" height="40" rx="4" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="854" y="549" font-size="20" class="dim">77</text>

  <text x="380" y="600" font-size="18" class="faint">Illustrative scores. The window is real — it just needs to move to where the decision happens.</text>
</svg>
