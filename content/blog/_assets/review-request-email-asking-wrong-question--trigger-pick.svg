<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">The coffee subscription's real decision trigger is identity, not the flavor question the review ask targets</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="600" y="90" font-size="24" text-anchor="middle" class="dim">Six decision triggers a purchase can turn on</text>

  <rect x="70" y="150" width="160" height="90" rx="12" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="150" y="202" font-size="20" text-anchor="middle" class="faint">permission</text>

  <rect x="250" y="150" width="160" height="90" rx="12" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="330" y="202" font-size="20" text-anchor="middle" class="faint">recognition</text>

  <rect x="430" y="130" width="200" height="130" rx="14" fill="#BD860E" fill-opacity="0.22" stroke="#BD860E" stroke-width="3" class="anim-breathe"/>
  <text x="530" y="190" font-size="26" text-anchor="middle" font-weight="600">identity</text>
  <text x="530" y="220" font-size="18" text-anchor="middle" class="dim">the real lever</text>

  <rect x="650" y="150" width="160" height="90" rx="12" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="730" y="202" font-size="20" text-anchor="middle" class="faint">belonging</text>

  <rect x="830" y="150" width="160" height="90" rx="12" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="910" y="202" font-size="20" text-anchor="middle" class="faint">momentum</text>

  <rect x="1010" y="150" width="160" height="90" rx="12" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="1090" y="202" font-size="18" text-anchor="middle" class="faint">fear of loss</text>

  <rect x="180" y="420" width="380" height="150" rx="12" fill="#CC4F42" fill-opacity="0.16" stroke="#CC4F42" stroke-width="2"/>
  <text x="200" y="464" font-size="20" class="dim">Asked: "How do you like</text>
  <text x="200" y="490" font-size="20" class="dim">your coffee?"</text>
  <text x="200" y="530" font-size="18" class="faint">Answer: "Tastes good."</text>

  <line x1="580" y1="495" x2="628" y2="495" stroke="#BD860E" stroke-width="3" stroke-linecap="round"/>
  <polygon points="628,485 650,495 628,505" fill="#BD860E"/>

  <rect x="650" y="420" width="380" height="150" rx="12" fill="#3E9847" fill-opacity="0.16" stroke="#3E9847" stroke-width="2"/>
  <text x="670" y="464" font-size="20" class="dim">Asked: describe the morning</text>
  <text x="670" y="490" font-size="20" class="dim">ritual this coffee is part of</text>
  <text x="670" y="530" font-size="18" class="faint">Answer: the real reason they subscribe</text>
</svg>
