<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Nadia's buyer turns on recognition, not the belonging trigger a copied Facebook group would have assumed.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="600" y="72" text-anchor="middle" font-size="32" font-weight="600">Which trigger does this buyer actually turn on?</text>

  <rect x="72" y="136" width="320" height="104" rx="16" class="hair"/>
  <text x="232" y="194" text-anchor="middle" font-size="24" class="faint">Permission</text>

  <rect x="440" y="136" width="320" height="104" rx="16" fill="#BD860E" fill-opacity="0.22" stroke="#BD860E" stroke-width="2" class="anim-breathe"/>
  <text x="600" y="186" text-anchor="middle" font-size="26" font-weight="700">Recognition</text>
  <text x="600" y="216" text-anchor="middle" font-size="18" class="dim">the real trigger</text>

  <rect x="808" y="136" width="320" height="104" rx="16" class="hair"/>
  <text x="968" y="194" text-anchor="middle" font-size="24" class="faint">Identity</text>

  <rect x="72" y="272" width="320" height="104" rx="16" fill="#CC4F42" fill-opacity="0.16" stroke="#CC4F42" stroke-width="2"/>
  <text x="232" y="322" text-anchor="middle" font-size="24" font-weight="600">Belonging</text>
  <text x="232" y="352" text-anchor="middle" font-size="17" class="dim">assumed, wrong</text>

  <rect x="440" y="272" width="320" height="104" rx="16" class="hair"/>
  <text x="600" y="330" text-anchor="middle" font-size="24" class="faint">Momentum</text>

  <rect x="808" y="272" width="320" height="104" rx="16" class="hair"/>
  <text x="968" y="330" text-anchor="middle" font-size="24" class="faint">Fear of Loss</text>

  <text x="600" y="452" text-anchor="middle" font-size="20" class="dim">Her buyer isn't looking to join a tribe of parents.</text>
  <text x="600" y="482" text-anchor="middle" font-size="20" class="dim">She wants proof her kid is capable of more.</text>

  <text x="600" y="580" text-anchor="middle" font-size="18" class="faint tool">identify_decision_trigger picks the lever before you build the mechanic</text>
</svg>
