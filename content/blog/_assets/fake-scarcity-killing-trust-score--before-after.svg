<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">A static scarcity claim reads as a lie the second week; a momentum-based claim doesn't</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="60" font-size="32" font-weight="600">Same spot on the page, two different claims</text>

  <!-- Before panel -->
  <rect x="70" y="110" width="480" height="440" rx="12" fill="rgba(204,79,66,.14)" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="310" y="150" font-size="24" text-anchor="middle" fill="#CC4F42" font-weight="600">Before</text>
  <rect x="130" y="230" width="360" height="60" rx="8" fill="rgba(204,79,66,.22)" stroke="#CC4F42" stroke-width="2" class="anim-breathe"/>
  <text x="310" y="267" font-size="20" text-anchor="middle" fill="#CC4F42">"Only 3 left" — 2 months, unchanged</text>
  <text x="310" y="330" font-size="18" text-anchor="middle" class="faint">Restocked twice. Banner never moved.</text>
  <text x="310" y="360" font-size="18" text-anchor="middle" fill="#CC4F42">reads as: we're not paying attention</text>

  <!-- After panel -->
  <rect x="650" y="110" width="480" height="440" rx="12" fill="rgba(62,152,71,.14)" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="890" y="150" font-size="24" text-anchor="middle" fill="#3E9847" font-weight="600">After</text>
  <rect x="710" y="230" width="360" height="60" rx="8" fill="rgba(62,152,71,.22)" stroke="#3E9847" stroke-width="2"/>
  <text x="890" y="267" font-size="20" text-anchor="middle" fill="#3E9847">real momentum proof, from her own reviews</text>
  <text x="890" y="330" font-size="18" text-anchor="middle" class="faint">Same spot. A claim she can check any day.</text>
  <text x="890" y="360" font-size="18" text-anchor="middle" fill="#3E9847">holds up: trigger = momentum, not a fake count</text>

  <text x="600" y="620" font-size="20" text-anchor="middle" class="dim">identify_decision_trigger named momentum. audit_asset caught the banner working against it.</text>
</svg>
