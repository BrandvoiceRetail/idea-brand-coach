<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">One line, one metric, one clean read — the shape every honest urgency test needs</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="60" font-size="32" font-weight="600">From Slack argument to one clean number</text>

  <!-- step 1: input -->
  <rect x="48" y="280" width="200" height="90" rx="10" fill="rgba(62,143,196,.2)" stroke="#3E8FC4" stroke-width="2"/>
  <text x="148" y="320" font-size="20" text-anchor="middle">eleven-message</text>
  <text x="148" y="345" font-size="20" text-anchor="middle">Slack debate</text>

  <line x1="248" y1="325" x2="330" y2="325" class="hair anim-flow"/>

  <!-- step 2 -->
  <rect x="330" y="280" width="230" height="90" rx="10" fill="rgba(189,134,14,.2)" stroke="#BD860E" stroke-width="2"/>
  <text x="445" y="330" font-size="18" text-anchor="middle" class="tool">identify_decision_trigger</text>

  <line x1="560" y1="325" x2="642" y2="325" class="hair anim-flow"/>

  <!-- step 3 -->
  <rect x="642" y="280" width="200" height="90" rx="10" fill="rgba(189,134,14,.2)" stroke="#BD860E" stroke-width="2"/>
  <text x="742" y="330" font-size="18" text-anchor="middle" class="tool">design_test</text>

  <line x1="842" y1="325" x2="924" y2="325" class="hair anim-flow"/>

  <!-- step 4 -->
  <rect x="924" y="280" width="228" height="90" rx="10" fill="rgba(189,134,14,.2)" stroke="#BD860E" stroke-width="2"/>
  <text x="1038" y="330" font-size="18" text-anchor="middle" class="tool">get_experiment_lift</text>

  <text x="600" y="440" font-size="20" text-anchor="middle" class="dim">One momentum-framed line. One metric: add-to-cart rate. One fixed duration.</text>
  <text x="600" y="475" font-size="20" text-anchor="middle" fill="#3E9847" font-weight="600">Output: a real number the team stops arguing about.</text>
</svg>
