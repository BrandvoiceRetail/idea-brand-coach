<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">A main image that reads fine at desktop size can turn to mush at real Amazon mobile thumbnail size.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect x="48" y="90" width="504" height="495" rx="10" fill="#CC4F42" fill-opacity="0.08" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="80" y="140" font-size="22" fill="#CC4F42" letter-spacing="1">DESKTOP — 27 INCHES</text>
  <rect x="120" y="190" width="360" height="320" rx="8" fill="#3E8FC4" fill-opacity="0.16" stroke="#3E8FC4" stroke-width="2"/>
  <text x="300" y="360" text-anchor="middle" font-size="22" class="dim">carrier detail</text>
  <text x="300" y="392" text-anchor="middle" font-size="16" class="faint">looks sharp, subtle contrast reads fine</text>
  <text x="300" y="550" text-anchor="middle" font-size="18" class="dim">Elena checks it here. Every time.</text>

  <line x1="574" y1="337" x2="626" y2="337" stroke="rgba(245,244,240,.5)" stroke-width="2" stroke-linecap="round"/>
  <polygon points="626,337 612,328 612,346" fill="rgba(245,244,240,.5)"/>

  <rect x="648" y="90" width="504" height="495" rx="10" fill="#BD860E" fill-opacity="0.08" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="680" y="140" font-size="22" fill="#BD860E" letter-spacing="1">MOBILE — ~300 PIXELS</text>
  <rect x="850" y="260" width="100" height="90" rx="6" fill="#CC4F42" fill-opacity="0.22" stroke="#CC4F42" stroke-width="2" class="anim-breathe"/>
  <text x="900" y="392" text-anchor="middle" font-size="18" fill="#CC4F42">detail gone</text>
  <text x="900" y="500" text-anchor="middle" font-size="18" class="dim">
    <tspan x="900" dy="0">This is what shoppers</tspan>
    <tspan x="900" dy="24">actually scroll past.</tspan>
  </text>
</svg>
