<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Packaging scored fine in the retention chain — the real leak sat two steps downstream.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="66" font-size="32" font-weight="600">run_funnel_audit: the retention chain</text>
  <text x="60" y="96" font-size="20" class="dim">Renata's repeat rate stalled at 11% — here is where the chain actually breaks.</text>

  <rect x="60" y="150" width="200" height="120" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="160" y="200" text-anchor="middle" font-size="19" class="faint">Order</text>
  <text x="160" y="226" text-anchor="middle" font-size="19" class="faint">confirmation</text>

  <rect x="285" y="150" width="200" height="120" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="385" y="200" text-anchor="middle" font-size="19" class="faint">Shipping</text>
  <text x="385" y="226" text-anchor="middle" font-size="19" class="faint">email</text>

  <rect x="510" y="150" width="200" height="120" rx="10" fill="#3E9847" fill-opacity="0.22" stroke="#3E9847" stroke-width="2"/>
  <text x="610" y="200" text-anchor="middle" font-size="19" fill="#3E9847" font-weight="600">Unboxing</text>
  <text x="610" y="226" text-anchor="middle" font-size="16" class="faint">scores fine</text>

  <rect x="735" y="150" width="200" height="120" rx="10" fill="#CC4F42" fill-opacity="0.22" stroke="#CC4F42" stroke-width="2" class="anim-breathe"/>
  <text x="835" y="200" text-anchor="middle" font-size="19" fill="#CC4F42" font-weight="600">Welcome</text>
  <text x="835" y="226" text-anchor="middle" font-size="16" fill="#CC4F42">series — missing</text>

  <rect x="960" y="150" width="180" height="120" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="1050" y="200" text-anchor="middle" font-size="19" class="faint">Winback</text>

  <text x="60" y="330" font-size="20" class="dim">The box was never broken. Nothing after it was built yet.</text>
  <text x="60" y="368" font-size="18" class="faint">audit_asset confirmed the unboxing card copy separately — also fine, also not the fix.</text>
</svg>
