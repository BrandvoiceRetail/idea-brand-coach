<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Reviews leak trust at two funnel points: the displayed reviews in Consideration, and the request flow itself in Advocacy.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- title -->
  <text x="48" y="70" font-size="32" font-weight="600">Where reviews actually leak trust</text>
  <text x="48" y="100" font-size="22" class="dim">The five-stage funnel, with the two review-driven positions marked</text>

  <!-- connector line through stages -->
  <line x1="90" y1="330" x2="1110" y2="330" class="hair"/>

  <!-- 5 stage boxes -->
  <!-- Awareness -->
  <rect x="70" y="280" width="180" height="100" rx="10" class="hair"/>
  <text x="160" y="335" font-size="24" text-anchor="middle" class="dim">Awareness</text>

  <!-- Consideration (highlight gold) -->
  <rect x="290" y="260" width="220" height="140" rx="10" fill="#BD860E" fill-opacity="0.22" stroke="#BD860E" stroke-width="3"/>
  <text x="400" y="315" font-size="26" text-anchor="middle" font-weight="600">Consideration</text>
  <text x="400" y="345" font-size="20" text-anchor="middle" class="dim">Displayed reviews</text>
  <rect x="316" y="360" width="168" height="30" rx="6" fill="#CC4F42" fill-opacity="0.25" stroke="#CC4F42" stroke-width="2"/>
  <text x="400" y="381" font-size="18" text-anchor="middle" class="dim">4.6★, flat CVR</text>

  <!-- Purchase -->
  <rect x="550" y="280" width="180" height="100" rx="10" class="hair"/>
  <text x="640" y="335" font-size="24" text-anchor="middle" class="dim">Purchase</text>

  <!-- Retention -->
  <rect x="770" y="280" width="180" height="100" rx="10" class="hair"/>
  <text x="860" y="335" font-size="24" text-anchor="middle" class="dim">Retention</text>

  <!-- Advocacy (secondary highlight, blue) -->
  <rect x="990" y="260" width="180" height="140" rx="10" fill="#3E8FC4" fill-opacity="0.20" stroke="#3E8FC4" stroke-width="3"/>
  <text x="1080" y="315" font-size="24" text-anchor="middle" font-weight="600">Advocacy</text>
  <text x="1080" y="345" font-size="19" text-anchor="middle" class="dim">Request flow</text>
  <text x="1080" y="368" font-size="18" text-anchor="middle" class="faint">the other leak</text>

  <!-- arrow from consideration leak toward advocacy, dashed flow -->
  <path d="M 400 400 C 400 470, 1080 470, 1080 402" class="hair anim-flow"/>

  <text x="48" y="470" font-size="19" class="faint">Same underlying cause: the reviews aren't matched to what the buyer needed proved.</text>
</svg>
