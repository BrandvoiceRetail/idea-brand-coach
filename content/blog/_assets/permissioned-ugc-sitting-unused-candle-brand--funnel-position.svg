<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Ninety permissioned clips exist. Three funnel positions have zero UGC presence — that's the gap.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="60" font-size="32" font-weight="600">get_funnel_coverage: 90 clips, 3 blank positions</text>
  <text x="60" y="90" font-size="20" class="dim">Awareness through Advocacy — where the permissioned footage already exists vs. where it runs.</text>

  <line x1="60" y1="200" x2="1140" y2="200" class="hair"/>

  <rect x="60" y="150" width="260" height="120" rx="10" fill="#BD860E" fill-opacity="0.22" stroke="#E7A412" stroke-width="2" class="anim-breathe"/>
  <text x="190" y="192" text-anchor="middle" font-size="20" fill="#BD860E" font-weight="600">Awareness</text>
  <text x="190" y="214" text-anchor="middle" font-size="15" class="faint">main image: 0 clips used</text>
  <text x="190" y="236" text-anchor="middle" font-size="15" class="faint">paid social: 0 clips used</text>

  <rect x="350" y="150" width="220" height="100" rx="10" fill="#CC4F42" fill-opacity="0.18" stroke="#CC4F42" stroke-width="2"/>
  <text x="460" y="192" text-anchor="middle" font-size="20" fill="#CC4F42" font-weight="600">Consideration</text>
  <text x="460" y="214" text-anchor="middle" font-size="15" class="faint">storefront about: blank</text>

  <rect x="600" y="150" width="180" height="100" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="690" y="205" text-anchor="middle" font-size="20" class="faint">Purchase</text>

  <rect x="810" y="150" width="180" height="100" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="900" y="205" text-anchor="middle" font-size="20" class="faint">Retention</text>

  <rect x="1020" y="150" width="120" height="100" rx="10" fill="none" stroke="rgba(245,244,240,.16)" stroke-width="2"/>
  <text x="1080" y="205" text-anchor="middle" font-size="18" class="faint">Advocacy</text>

  <text x="60" y="330" font-size="22" fill="#BD860E" font-weight="600">90 clips sit in the shared drive</text>
  <text x="60" y="365" font-size="18" class="dim">Zero routed into the gold position: amazon_main_image, the one closest to the click.</text>
  <text x="60" y="410" font-size="18" class="faint">run_funnel_audit ranks main image highest-leverage — fix it first, storefront second.</text>
</svg>
