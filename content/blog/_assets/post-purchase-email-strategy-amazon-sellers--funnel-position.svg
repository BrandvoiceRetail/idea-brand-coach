<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Every post-purchase email lives in one funnel stage — Retention — and most brands leave it empty</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="48" y="70" font-size="32" font-weight="600">Where post-purchase email actually lives</text>
  <text x="48" y="100" font-size="20" class="dim">Five funnel stages, one stage most brands leave empty</text>

  <!-- stage strip -->
  <line x1="90" y1="330" x2="1110" y2="330" class="hair"/>

  <!-- Awareness -->
  <rect x="70" y="290" width="170" height="80" rx="8" fill="rgba(62,143,196,.2)" stroke="#3E8FC4" stroke-width="2"/>
  <text x="155" y="335" font-size="22" text-anchor="middle">Awareness</text>

  <!-- Consideration -->
  <rect x="270" y="290" width="180" height="80" rx="8" fill="rgba(62,143,196,.2)" stroke="#3E8FC4" stroke-width="2"/>
  <text x="360" y="335" font-size="22" text-anchor="middle">Consideration</text>

  <!-- Purchase -->
  <rect x="480" y="290" width="150" height="80" rx="8" fill="rgba(62,143,196,.2)" stroke="#3E8FC4" stroke-width="2"/>
  <text x="555" y="335" font-size="22" text-anchor="middle">Purchase</text>

  <!-- Retention (highlight, gold) -->
  <rect x="660" y="270" width="230" height="120" rx="10" fill="rgba(189,134,14,.22)" stroke="#BD860E" stroke-width="3" class="anim-breathe"/>
  <text x="775" y="325" font-size="24" text-anchor="middle" font-weight="600">Retention</text>
  <text x="775" y="353" font-size="18" text-anchor="middle" class="faint">welcome · winback · confirm · support</text>

  <!-- red leak marker -->
  <circle cx="895" cy="270" r="10" fill="#CC4F42"/>
  <text x="913" y="255" font-size="20" fill="#CC4F42">most brands build nothing here</text>

  <!-- Advocacy -->
  <rect x="960" y="290" width="170" height="80" rx="8" fill="rgba(62,143,196,.2)" stroke="#3E8FC4" stroke-width="2"/>
  <text x="1045" y="335" font-size="22" text-anchor="middle">Advocacy</text>

  <!-- annotation callout -->
  <text x="660" y="440" font-size="20" class="faint">A shopper who just paid trusts you the most they ever will.</text>
  <text x="660" y="466" font-size="20" class="faint">Five email moments decide whether that trust compounds or evaporates.</text>
</svg>
