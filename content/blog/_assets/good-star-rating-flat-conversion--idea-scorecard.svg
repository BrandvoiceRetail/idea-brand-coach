<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Insight-Driven is the weak pillar behind Farrukh's flat CVR — a 4.6-star average never proves the one thing buyers need.</title>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #F5F4F0; }
    .dim { fill: rgba(245,244,240,.78); } .faint { fill: rgba(245,244,240,.5); }
    .hair { stroke: rgba(245,244,240,.16); stroke-width: 2; fill: none; }
    .tool { font-family: ui-monospace, Menlo, monospace; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
    @keyframes breathe { 50% { opacity: .75; } }
    .anim-flow { stroke-dasharray: 12 12; animation: flow 3.5s linear infinite; }
    .anim-breathe { animation: breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <text x="60" y="66" font-size="32" font-weight="600">run_trust_gap: why rating and CVR split</text>
  <text x="60" y="96" font-size="20" class="dim">4.6 stars, healthy volume — only one pillar explains the flat conversion.</text>

  <line x1="380" y1="150" x2="1140" y2="150" class="hair"/>
  <line x1="380" y1="620" x2="1140" y2="620" class="hair"/>

  <text x="60" y="184" font-size="24">Insight-Driven</text>
  <rect x="380" y="162" width="230" height="40" rx="4" fill="#CC4F42" fill-opacity="0.25" stroke="#CC4F42" stroke-width="2" class="anim-breathe"/>
  <text x="630" y="189" font-size="20" fill="#CC4F42">the gap</text>

  <text x="60" y="304" font-size="24">Distinctive</text>
  <rect x="380" y="282" width="580" height="40" rx="4" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="980" y="309" font-size="20" class="dim">solid</text>

  <text x="60" y="424" font-size="24">Empathetic</text>
  <rect x="380" y="402" width="600" height="40" rx="4" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="1000" y="429" font-size="20" class="dim">solid</text>

  <text x="60" y="544" font-size="24">Authentic</text>
  <rect x="380" y="522" width="615" height="40" rx="4" fill="#3E8FC4" fill-opacity="0.2" stroke="#3E8FC4" stroke-width="2"/>
  <text x="1015" y="549" font-size="20" class="dim">solid</text>

  <text x="380" y="600" font-size="18" class="faint">Four hundred reviews prove the dash cam works. Zero prove it works when a claim is on the line.</text>
</svg>
