[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://lovable.app", "http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_confirmations = false

[edge_runtime]
enabled = true

[functions.ai-insight-guidance]
verify_jwt = false

# Auth is enforced in-function via getAuthedUserId (the PIXII_API_KEY secret
# never reaches the browser); verify_jwt stays off so the function owns the gate.
[functions.pixii-generate]
verify_jwt = false

# Auth is enforced in-function via getAuthedUserId. Palmier is the LOCAL video app;
# the PALMIER_MCP_URL / PALMIER_ORIGIN secrets (tunnel endpoint + localhost Origin)
# stay server-side. verify_jwt stays off so the function owns the gate.
[functions.palmier-generate]
verify_jwt = false

# Auth is enforced in-function via getAuthedUserId. fal.ai is the CLOUD video
# provider; the FAL_KEY (+ optional FAL_VIDEO_MODEL) secret stays server-side.
# verify_jwt stays off so the function owns the gate.
[functions.fal-video-generate]
verify_jwt = false

# Brief-driven image generator (Nano Banana Pro via the Gemini API). The function owns
# the gate (getAuthedUserId); the GEMINI_API_KEY secret stays server-side.
[functions.gemini-image-generate]
verify_jwt = false

[functions.buyer-intent-analyzer]
verify_jwt = false

[functions.contextual-help]
verify_jwt = false

[functions.idea-framework-consultant]
verify_jwt = false

# Document text-extraction. verify_jwt stays TRUE: the platform requires a valid JWT,
# and the function additionally resolves the caller via auth.getUser() and scopes EVERY
# uploaded_documents query to that user_id (closes the IDOR — a forged documentId can't
# read or mutate another tenant's row).
[functions.document-processor]
verify_jwt = true

[functions.save-beta-feedback]
verify_jwt = false

# verify_jwt stays true: the anon key is itself a valid JWT, so anonymous
# app submissions pass; user_id is derived from the verified token in-function.
[functions.save-feedback-event]
verify_jwt = true

# Framework-submission email. verify_jwt stays TRUE: requires a valid session, and the
# recipient is ALWAYS the authenticated user's own email (never a caller-supplied address,
# so it cannot be used as an open relay); user-supplied fields are HTML-escaped in-function.
[functions.send-framework-email]
verify_jwt = true

[functions.sync-diagnostic-to-embeddings]
verify_jwt = false

[functions.brand-coach-gpt]
verify_jwt = false

[functions.create-user-kb]
verify_jwt = false

[functions.ensure-user-kb]
verify_jwt = false

[functions.sync-diagnostic-to-user-kb]
verify_jwt = false

[functions.diagnostic-interpretation]
verify_jwt = false

[functions.import-product-data]
verify_jwt = false

# Figma integration. verify_jwt stays true so the platform requires a valid JWT;
# each function additionally derives user_id from the verified token (getAuthedUserId)
# and rejects anonymous callers. All Figma access is tied to auth.uid().
[functions.figma-oauth-start]
verify_jwt = true

[functions.figma-oauth-exchange]
verify_jwt = true

[functions.figma-status]
verify_jwt = true

[functions.figma-sync]
verify_jwt = true

[functions.figma-disconnect]
verify_jwt = true

# Decision Trigger derivation — runs in the public Alpha diagnostic flow (pre-auth),
# so verify_jwt=false; the function validates its own inputs (Trust Gap scores + reviews).
[functions.identify-decision-trigger]
verify_jwt = false

# Lead-magnet capture — anonymous visitors submit their free Trust Gap diagnostic
# results, so verify_jwt=false; the function validates its own inputs (email,
# consent, scores), inserts via the service role, and emails the report.
[functions.submit-diagnostic-lead]
verify_jwt = false

# Forensic Trust Gap engine — the PAID, signed-in-only deep analysis. verify_jwt
# stays true: the user is derived from the verified JWT, the listing is imported
# and read back scoped to that user, and the forensic IDEA scores are derived
# from the listing's own evidence (not self-report).
[functions.run-forensic-analysis]
verify_jwt = true

# Canva Connect integration. The callback is hit by Canva's browser redirect
# (no app JWT) and is secured by the opaque OAuth state; every other function
# derives the user from the verified JWT.
[functions.canva-oauth-start]
verify_jwt = true

[functions.canva-oauth-callback]
verify_jwt = false

[functions.canva-status]
verify_jwt = true

[functions.canva-disconnect]
verify_jwt = true

[functions.canva-list-designs]
verify_jwt = true

[functions.canva-imports]
verify_jwt = true

[functions.canva-sync]
verify_jwt = true
# Competitor-Agents P2 analyzer. verify_jwt=false to match the IDEA fns
# (diagnostic-interpretation / ai-insight-guidance): auth is OPTIONAL — the fn
# forwards the Authorization header to getUser itself for the avatar KB fallback
# and to scope persistence; the marketplace read works for the host without a user.
[functions.competitor-analysis-asset]
verify_jwt = false

# Competitor-Agents P4 lift-loop rewrite. verify_jwt=false to match the other
# generative coaching fns (brand-copy-generator pattern): the rewrite is a pure
# generation over the supplied brief + context, no DB access, no persistence.
[functions.funnel-rewrite]
verify_jwt = false

# Competitor-Agents P6 brand-defense monitor (Track B). verify_jwt=false to match
# competitor-analysis-asset: auth is OPTIONAL — the fn forwards the Authorization
# header to scope persistence (brand_defense_alerts) and works for the host
# without a user. The only wired alert source is the Titan STUB (coverage
# UNVERIFIED per Trevor); a real Titan adapter is a separate, human-gated build.
[functions.brand-defense-monitor]
verify_jwt = false

# process-scrape-jobs (bulk review-scrape drainer): verify_jwt=false because the
# pg_cron safety-net kicks it with a drain-only secret (not a JWT, so the platform's
# verify_jwt would 401 it). The fn does its OWN auth — service-role bearer |
# DRAIN_CRON_SECRET | getUser(valid user) — and rejects everyone else (401). The drain
# work runs service-role INTERNALLY, and a kick only ever triggers a rate-limited drain.
[functions.process-scrape-jobs]
verify_jwt = false

# Paid, signed-in-only LLM functions (Claude Sonnet). verify_jwt stays TRUE so the
# platform rejects anonymous callers before any model call — pinned here explicitly so a
# redeploy can never drop the gate to --no-verify-jwt and turn these into cost-abuse vectors.
# Each also resolves the user in-function (parity with run-forensic-analysis).
[functions.reveal-signature]
verify_jwt = true

[functions.export-brief]
verify_jwt = true

[functions.diagnostic-interpretation-evidence]
verify_jwt = true

[functions.create-checkout-session]
verify_jwt = true

# Stripe calls this server-to-server with no browser JWT; the function verifies the
# Stripe signature itself, so platform JWT verification stays OFF.
[functions.stripe-webhook]
verify_jwt = false

# GDPR data-subject-rights functions (right of access/portability + right to
# erasure). verify_jwt pinned TRUE: both act ONLY on the caller's own account and
# must be unreachable anonymously at the platform edge; each also re-derives the
# user in-function (edge-auth getAuthedUserId) — never from request params.
[functions.gdpr-export]
verify_jwt = true

[functions.gdpr-delete-account]
verify_jwt = true
